function cleanVoterName(name) {
  return (name || "").trim().toLowerCase();
}

function isRealMatch(v) {
  return v.match_id && v.match_id !== "TEST";
}

function isPredictionVote(v) {
  return isRealMatch(v) && (v.player === TIP_HOME_PLAYER || v.player === TIP_AWAY_PLAYER);
}

function isPlayerVote(v) {
  return isRealMatch(v) && v.player !== AWAY_FANS_PLAYER && !isPredictionVote(v);
}

function isAwayFansVote(v) {
  return isRealMatch(v) && v.player === AWAY_FANS_PLAYER;
}

async function fetchVotes(query = "") {
  const response = await fetch(
    SUPABASE_URL + "/rest/v1/votes" + query,
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  if (!response.ok) return [];
  return await response.json();
}

function buildStats(data) {
  let stats = {};

  data.forEach(v => {
    if (!stats[v.player]) stats[v.player] = { total:0, count:0, ratings:[], matches:{} };
    stats[v.player].total += Number(v.rating);
    stats[v.player].count += 1;
    stats[v.player].ratings.push(Number(v.rating));

    if (!stats[v.player].matches[v.match_id]) stats[v.player].matches[v.match_id] = [];
    stats[v.player].matches[v.match_id].push(Number(v.rating));
  });

  return Object.keys(stats).map(player => ({
    player,
    avg: stats[player].total / stats[player].count,
    count: stats[player].count,
    ratings: stats[player].ratings,
    matches: stats[player].matches
  })).sort((a,b) => b.avg - a.avg);
}

function stdDev(values) {
  if (!values || values.length < 2) return 0;
  const avg = values.reduce((a,b)=>a+b,0) / values.length;
  const variance = values.reduce((sum,v)=>sum + Math.pow(v - avg, 2), 0) / values.length;
  return Math.sqrt(variance);
}

function renderMiniRanking(items, limit = 5, showMedals = true) {
  if (!items || items.length === 0) return `<div class="small">Ingen data enda.</div>`;

  const medals = ["🥇","🥈","🥉"];
  let html = "";

    html += `

        <div class="result-score">${r.score}</div>
      </div>
    `;
  });

  return html;
}

function getOpponentName(matchId) {
  const match = matchesData.find(m => m.id === matchId);
  if (!match) return "Ukjent";
  return match.home === "Lyn" ? match.away : match.home;
}

function buildBBCounts(allVotes) {
  const matches = [...new Set(allVotes.filter(isPlayerVote).map(v => v.match_id))];
  let counts = {};
  let margins = [];

  matches.forEach(match => {
    const matchVotes = allVotes.filter(v => v.match_id === match && isPlayerVote(v));
    const ranking = buildStats(matchVotes);

    if (ranking.length > 0) {
      const winner = ranking[0].player;
      counts[winner] = (counts[winner] || 0) + 1;

      if (ranking.length > 1) {
        margins.push({
          player: winner,
          score: (ranking[0].avg - ranking[1].avg).toFixed(2),
          raw: ranking[0].avg - ranking[1].avg,
          sub: match
        });
      }
    }
  });

  return {
    counts: Object.keys(counts).map(player => ({
      player,
      score: counts[player],
      sub: "BB"
    })).sort((a,b) => b.score - a.score),
    margins: margins.sort((a,b)=>b.raw-a.raw)
  };
}

function buildWorstPlayers(allVotes) {
  return buildStats(allVotes.filter(isPlayerVote))
    .filter(r => r.count >= 2)
    .sort((a,b) => a.avg - b.avg)
    .map(r => ({
      player:r.player,
      score:r.avg.toFixed(2),
      sub:`${r.count} stemmer`
    }));
}

function buildTopVoters(allVotes) {
  let voters = {};

  allVotes.filter(isPlayerVote).forEach(v => {
    const name = cleanVoterName(v.voter);
    voters[name] = (voters[name] || 0) + 1;
  });

  return Object.keys(voters).map(v => ({
    player:v,
    score:voters[v],
    sub:"stemmer"
  })).sort((a,b)=>b.score-a.score);
}

function buildControversial(allVotes) {

    .map(r => ({

      score:stdDev(r.ratings).toFixed(2),

      sub:`${r.count} stemmer`
    }))
    .sort((a,b) => b.raw - a.raw);
}

function buildStable(allVotes) {

    .map(r => ({

      raw:stdDev(r.ratings),
      sub:`${r.count} stemmer`
    }))
    .sort((a,b) => a.raw - b.raw);
}

function buildAwayFansStats(allVotes) {
  let teams = {};

  allVotes.filter(isAwayFansVote).forEach(v => {
    const opponent = getOpponentName(v.match_id);
    if (!teams[opponent]) teams[opponent] = { total:0, count:0 };
    teams[opponent].total += Number(v.rating);
    teams[opponent].count += 1;
  });

  return Object.keys(teams).map(team => ({
    player:team,
    score:(teams[team].total / teams[team].count).toFixed(2),
    raw:teams[team].total / teams[team].count,
    sub:`${teams[team].count} stemmer`
  })).sort((a,b)=>b.raw-a.raw);
}

function decodeGoals(value) {
  return Number(value) - 1;
}

function getOutcome(home, away) {
  if (home > away) return "H";
  if (home < away) return "B";
  return "U";
}

function scorePrediction(tipHome, tipAway, actualHome, actualAway) {
  if (tipHome === actualHome && tipAway === actualAway) return 3;
  if (getOutcome(tipHome, tipAway) === getOutcome(actualHome, actualAway)) return 1;
  return 0;
}

function buildPredictions(votes) {
  let map = {};

  votes.filter(isPredictionVote).forEach(v => {
    const voter = cleanVoterName(v.voter);
    const key = `${v.match_id}|||${voter}`;
    if (!map[key]) map[key] = { match_id:v.match_id, voter, home:null, away:null };

    if (v.player === TIP_HOME_PLAYER) map[key].home = decodeGoals(v.rating);
    if (v.player === TIP_AWAY_PLAYER) map[key].away = decodeGoals(v.rating);
  });

  return Object.values(map).filter(p => p.home !== null && p.away !== null);
}

function buildPredictionLeaderboardRows(allVotes) {
  const predictions = buildPredictions(allVotes);
  let users = {};

  predictions.forEach(p => {
    const matchData = matchesData.find(m => m.id === p.match_id);
    const actual = matchData ? matchData.actual : null;
    if (!actual) return;

    const points = scorePrediction(p.home, p.away, actual.home, actual.away);
    if (!users[p.voter]) users[p.voter] = { points:0, correct:0, outcomes:0, tips:0 };

    users[p.voter].points += points;
    users[p.voter].tips += 1;
    if (points === 3) users[p.voter].correct += 1;
    if (points === 1) users[p.voter].outcomes += 1;
  });

  return Object.keys(users).map(user => ({
    player:user,
    score:users[user].points + " p",
    raw:users[user].points,
    sub:`🎯 ${users[user].correct} helt riktige · 🔮 ${users[user].outcomes} riktig utfall · ${users[user].tips} tips`
  })).sort((a,b) => b.raw - a.raw);
}

function fantasyPosition(playerName) {
  const p = players.find(x => x.short === playerName || x.name === playerName);
  return p ? p.position : "";
}

function calculateFantasyPoints(player, isCaptain, statsMap) {
  const stat = statsMap[player];
  const position = fantasyPosition(player);
  if (!stat) return 0;

  let points = 0;

  if (stat.goals > 0) {
    if (position === "ANG") points += stat.goals * 4;
    if (position === "MID") points += stat.goals * 5;
    if (position === "FORS") points += stat.goals * 6;
    if (position === "KEEPER") points += stat.goals * 10;
  }

  points += (stat.assists || 0) * 3;

  if (stat.clean_sheet) {
    if (position === "MID") points += 1;
    if (position === "FORS") points += 4;
    if (position === "KEEPER") points += 5;
  }

  if (stat.penalty_save && position === "KEEPER") points += 5;
  if (stat.red_card) points -= 3;
  if (stat.rating >= 7.5) points += 1;
  if (stat.rating > 0 && stat.rating <= 4.5) points -= 1;
  if (isCaptain) points += 2;

  return points;
}

async function loadFantasyLeaderboard() {
  const { data: picks, error: picksError } = await supabaseClient
    .from("fantasy_picks")
    .select("*")
    .eq("match_id", fantasyMatchId);

  const { data: stats, error: statsError } = await supabaseClient
    .from("fantasy_stats")
    .select("*")
    .eq("match_id", fantasyMatchId);

  if (picksError || statsError) {
    console.error(picksError || statsError);
    document.getElementById("fantasyLeaderboard").innerHTML =
      "Klarte ikke å laste fantasy.";
    return;
  }

  const statsMap = {};
  (stats || []).forEach(row => {
    statsMap[row.player] = row;
  });

  if (!picks || picks.length === 0) {
    document.getElementById("fantasyLeaderboard").innerHTML =
      "Ingen fantasy-lag sendt inn ennå.";
    return;
  }

  const leaderboard = picks.map(pick => {
    const total =
      calculateFantasyPoints(pick.player1, false, statsMap) +
      calculateFantasyPoints(pick.player2, false, statsMap) +
      calculateFantasyPoints(pick.captain, true, statsMap);

    return {
      voter: pick.voter,
      player1: pick.player1,
      player2: pick.player2,
      captain: pick.captain,
      total
    };
  }).sort((a, b) => b.total - a.total);

 const pickCounts = {};
const captainCounts = {};

leaderboard.forEach(row => {
  [row.player1, row.player2, row.captain].forEach(p => {
    pickCounts[p] = (pickCounts[p] || 0) + 1;
  });

  captainCounts[row.captain] = (captainCounts[row.captain] || 0) + 1;
});

const mostPicked = Object.entries(pickCounts)
  .sort((a,b) => b[1] - a[1])[0];

const mostCaptained = Object.entries(captainCounts)
  .sort((a,b) => b[1] - a[1])[0];

const fantasyMVP = Object.entries(statsMap)
  .map(([player, stat]) => ({
    player,
    points: calculateFantasyPoints(player, false, statsMap)
  }))
  .sort((a,b) => b.points - a.points)[0];

document.getElementById("fantasyLeaderboard").innerHTML = `
  <p><strong>${fantasyMatchId}</strong></p>

  <div class="stats-grid" style="margin-bottom:18px;">
    
    <div class="stat-card">
      <h3>👑 Fantasy MVP</h3>
      <div class="result-row">
        <div>
          <strong>${fantasyMVP.player}</strong><br>
          <span class="small">Flest fantasy-poeng</span>
        </div>
        <div class="result-score">${fantasyMVP.points}</div>
      </div>
    </div>

    <div class="stat-card">
      <h3>🔥 Mest valgt</h3>
      <div class="result-row">
        <div>
          <strong>${mostPicked[0]}</strong><br>
          <span class="small">Valgt av flest brukere</span>
        </div>
        <div class="result-score">${mostPicked[1]}</div>
      </div>
    </div>

    <div class="stat-card">
      <h3>⭐ Mest valgt kaptein</h3>
      <div class="result-row">
        <div>
          <strong>${mostCaptained[0]}</strong><br>
          <span class="small">Kaptein hos flest</span>
        </div>
        <div class="result-score">${mostCaptained[1]}</div>
      </div>
    </div>

  </div>

  <table class="fantasy-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Bruker</th>
        <th>Lag</th>
        <th>Poeng</th>
      </tr>
    </thead>
    <tbody>
      ${leaderboard.map((row, index) => `
        <tr>
          <td>${index + 1}</td>
          <td><strong>${row.voter}</strong></td>
          <td>${row.player1}, ${row.player2}, ⭐ ${row.captain}</td>
          <td>${row.total}</td>
        </tr>
      `).join("")}
    </tbody>
  </table>
`;
}

async function loadStatsCenter() {
  const allVotes = await fetchVotes();
  const realVotes = allVotes.filter(isPlayerVote);
  const box = document.getElementById("statsCenter");

  if (!realVotes || realVotes.length === 0) {
    box.innerHTML = `<div class="warning">Ingen ekte spillerstemmer enda.</div>`;
    return;
  }

  const season = buildStats(realVotes).filter(r => r.count >= 2);
  const seasonItems = season.map(r => ({
    player:r.player,
    score:r.avg.toFixed(2),
    sub:`${r.count} stemmer`
  }));

  const totalVotes = realVotes.length;
  const uniqueMatches = new Set(realVotes.map(v => v.match_id)).size;
  const uniqueVoters = new Set(realVotes.map(v => cleanVoterName(v.voter))).size;

  const bb = buildBBCounts(realVotes);
  const worstPlayers = buildWorstPlayers(realVotes);
  const topVoters = buildTopVoters(realVotes);
  const controversial = buildControversial(realVotes);
  const stable = buildStable(realVotes);
  const awayFansStats = buildAwayFansStats(allVotes);
  const predictionLeaders = buildPredictionLeaderboardRows(allVotes);

  box.innerHTML = `
    <div class="hero-stat">
      <h3>Sesongstatus</h3>
      <div class="big">${totalVotes} spillerstemmer</div>
      <div>${uniqueMatches} kamper · ${uniqueVoters} brukere</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>🏆 Sesongtoppen</h3>
        ${renderMiniRanking(seasonItems, 8)}
      </div>

      <div class="stat-card">
        <h3>😬 Skjerpings</h3>
        ${renderMiniRanking(worstPlayers, 8, false)}
      </div>

      <div class="stat-card">
        <h3>👑 Flest BB</h3>
        ${renderMiniRanking(bb.counts, 8)}
      </div>

      <div class="stat-card">
        <h3>💪 Størst BB-margin</h3>
        ${renderMiniRanking(bb.margins, 8, false)}
      </div>

      <div class="stat-card">
        <h3>🤯 Mest uenighet</h3>
        ${renderMiniRanking(controversial, 8, false)}
      </div>

      <div class="stat-card">
        <h3>🧱 Mest stabil</h3>
        ${renderMiniRanking(stable, 8, false)}
      </div>

      <div class="stat-card">
        <h3>🏅 Topp bidragsytere</h3>
        ${renderMiniRanking(topVoters, 8, false)}
      </div>

      <div class="stat-card">
        <h3>🏟️ Beste motstanderfans</h3>
        ${renderMiniRanking(awayFansStats, 8, false)}
      </div>

      <div class="stat-card">
        <h3>🎯 Tippetabellen</h3>
        ${renderMiniRanking(predictionLeaders, 99)}
      </div>
    </div>
  `;
}

loadStatsCenter();
loadFantasyLeaderboard();
</script>

<script defer src="/_vercel/analytics/script.js"></script>
