<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lynbørs 2.0 • Profil</title>

  <link rel="icon" href="../lblogoen.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div id="navbar"></div>

<main class="page-wrap">

  <section id="profileHero" class="profile-hero">Laster profil...</section>

  <section class="data-grid">
    <div class="data-card">
      <h2>Børs</h2>
      <div id="ratingStats">Laster...</div>
    </div>

    <div class="data-card">
      <h2>Tipping</h2>
      <div id="tipStats">Laster...</div>
    </div>
  </section>

  <section class="data-grid">
    <div class="data-card">
      <h2>Fantasy</h2>
      <div id="fantasyStats">Laster...</div>
    </div>

    <div class="data-card">
      <h2>Favoritter</h2>
      <div id="favoriteStats">Laster...</div>
    </div>
  </section>

  <section class="data-card">
    <h2>Siste børsstemmer</h2>
    <div id="recentVotes">Laster...</div>
  </section>

</main>

<div id="footer"></div>

<script type="module">
import { renderNavbar, renderFooter } from "./js/layout.js";
import { supabaseClient } from "./js/supabase.js";
import { fetchMatches } from "./js/matches.js";
import {
  fetchVotes,
  getPlayerVotes,
  isPredictionVote
} from "./js/ratings.js";
import {
  getPlayerImage,
  getPlayerDisplayName,
  getPlayerId
} from "./js/players.js";

document.getElementById("navbar").innerHTML = renderNavbar("profil");
document.getElementById("footer").innerHTML = renderFooter();

const params = new URLSearchParams(window.location.search);
const usernameRaw = params.get("user") || params.get("voter") || "";

const heroEl = document.getElementById("profileHero");
const ratingStatsEl = document.getElementById("ratingStats");
const tipStatsEl = document.getElementById("tipStats");
const fantasyStatsEl = document.getElementById("fantasyStats");
const favoriteStatsEl = document.getElementById("favoriteStats");
const recentVotesEl = document.getElementById("recentVotes");

const TIP_HOME_PLAYER = "TIP_HOME_GOALS";
const TIP_AWAY_PLAYER = "TIP_AWAY_GOALS";

function cleanName(value) {
  return String(value || "").trim().toLowerCase();
}

function displayName(value) {
  return String(value || "").trim() || "Ukjent bruker";
}

function round(value, decimals = 2) {
  return Number(Number(value || 0).toFixed(decimals));
}

function decodeGoals(value) {
  return Number(value) - 1;
}

function getOutcome(home, away) {
  home = Number(home);
  away = Number(away);
  if (home > away) return "H";
  if (home < away) return "B";
  return "U";
}

function scorePrediction(tipHome, tipAway, actualHome, actualAway) {
  const exact = Number(tipHome) === Number(actualHome) && Number(tipAway) === Number(actualAway);
  const sameOutcome = getOutcome(tipHome, tipAway) === getOutcome(actualHome, actualAway);
  const sameGoalDiff = (Number(tipHome) - Number(tipAway)) === (Number(actualHome) - Number(actualAway));

  if (exact) return 3;
  if (sameOutcome && sameGoalDiff) return 2;
  if (sameOutcome) return 1;
  return 0;
}

function getMatchTitle(matchId, matches) {
  const match = matches.find(m => String(m.id) === String(matchId));
  if (!match) return matchId;
  return `${match.home} - ${match.away}`;
}

function getMatchDate(matchId, matches) {
  const match = matches.find(m => String(m.id) === String(matchId));
  if (!match || !match.date) return "";
  const d = new Date(match.date);
  if (Number.isNaN(d.getTime())) return "";
  return d.toLocaleDateString("no-NO", { day:"2-digit", month:"2-digit" });
}

function buildPredictions(votes) {
  const map = {};

  votes
    .filter(isPredictionVote)
    .forEach(v => {
      const key = `${v.match_id}_${cleanName(v.voter)}`;

      if (!map[key]) {
        map[key] = {
          voter:v.voter,
          match_id:v.match_id,
          home:null,
          away:null
        };
      }

      if (v.player === TIP_HOME_PLAYER) map[key].home = decodeGoals(v.rating);
      if (v.player === TIP_AWAY_PLAYER) map[key].away = decodeGoals(v.rating);
    });

  return Object.values(map).filter(p => p.home !== null && p.away !== null);
}

async function fetchFantasyPicks() {
  const { data, error } = await supabaseClient
    .from("fantasy_picks")
    .select("*")
    .limit(5000);

  if (error) {
    console.error("Kunne ikke hente fantasy_picks", error);
    return [];
  }

  return data || [];
}

function renderMiniStats(items) {
  return `
    <div class="stat-grid">
      ${items.map(item => `
        <div class="mini-stat">
          <span>${item.label}</span>
          <strong>${item.value}</strong>
        </div>
      `).join("")}
    </div>
  `;
}

function playerChip(playerName, extra = "") {
  const id = getPlayerId(playerName);
  const href = id ? `spiller.html?id=${encodeURIComponent(id)}` : `spiller.html?player=${encodeURIComponent(playerName)}`;

  return `
    <a class="player-chip" href="${href}">
      <img src="${getPlayerImage(playerName)}" onerror="this.src='../lblogoen.png'">
      <span>${getPlayerDisplayName(playerName)}</span>
      ${extra ? `<strong>${extra}</strong>` : ""}
    </a>
  `;
}

async function init() {
  const wantedUser = cleanName(usernameRaw);

  if (!wantedUser) {
    heroEl.innerHTML = `<div class="data-card">Ingen bruker valgt.</div>`;
    ratingStatsEl.innerHTML = "";
    tipStatsEl.innerHTML = "";
    fantasyStatsEl.innerHTML = "";
    favoriteStatsEl.innerHTML = "";
    recentVotesEl.innerHTML = "";
    return;
  }

  const [votes, matches, fantasyPicks] = await Promise.all([
    fetchVotes(),
    fetchMatches(),
    fetchFantasyPicks()
  ]);

  const playerVotes = getPlayerVotes(votes).filter(v => cleanName(v.voter) === wantedUser);
  const predictions = buildPredictions(votes).filter(p => cleanName(p.voter) === wantedUser);
  const userFantasyPicks = fantasyPicks.filter(p => cleanName(p.voter) === wantedUser);

  const name = displayName(playerVotes[0]?.voter || predictions[0]?.voter || userFantasyPicks[0]?.voter || usernameRaw);

  const ratings = playerVotes
    .map(v => Number(v.rating))
    .filter(v => !Number.isNaN(v));

  const averageGiven = ratings.length ? round(ratings.reduce((a,b) => a + b, 0) / ratings.length) : 0;
  const uniqueMatchesRated = new Set(playerVotes.map(v => v.match_id)).size;

  const playerCounts = {};
  playerVotes.forEach(v => {
    const player = String(v.player || "").trim();
    if (!player) return;
    playerCounts[player] = (playerCounts[player] || 0) + 1;
  });

  const favoritePlayers = Object.entries(playerCounts)
    .map(([player, count]) => ({ player, count }))
    .sort((a,b) => b.count - a.count);

  let tipPoints = 0;
  let exact = 0;
  let outcome = 0;
  let scoredTips = 0;

  predictions.forEach(p => {
    const match = matches.find(m => String(m.id) === String(p.match_id));
    if (!match || match.actual_home == null || match.actual_away == null) return;

    const points = scorePrediction(p.home, p.away, match.actual_home, match.actual_away);
    tipPoints += points;
    scoredTips++;

    if (points === 3) exact++;
    if (points > 0) outcome++;
  });

  const captainCounts = {};
  userFantasyPicks.forEach(pick => {
    const captain = String(pick.captain || "").trim();
    if (!captain) return;
    captainCounts[captain] = (captainCounts[captain] || 0) + 1;
  });

  const favoriteCaptain = Object.entries(captainCounts)
    .map(([player, count]) => ({ player, count }))
    .sort((a,b) => b.count - a.count)[0];

  heroEl.innerHTML = `
    <div class="profile-hero-card">
      <div class="profile-avatar">${name.slice(0, 1).toUpperCase()}</div>

      <div>
        <div class="badge">BRUKERPROFIL</div>
        <h1>${name}</h1>
        <div class="match-meta">
          ${ratings.length} børsstemmer · ${predictions.length} tips · ${userFantasyPicks.length} fantasylag
        </div>
      </div>
    </div>
  `;

  ratingStatsEl.innerHTML = renderMiniStats([
    { label:"Stemmer", value:ratings.length },
    { label:"Snitt gitt", value:averageGiven || "-" },
    { label:"Kamper", value:uniqueMatchesRated },
    { label:"Høyeste", value:ratings.length ? Math.max(...ratings) : "-" },
    { label:"Laveste", value:ratings.length ? Math.min(...ratings) : "-" },
    { label:"Spillere", value:Object.keys(playerCounts).length }
  ]);

  tipStatsEl.innerHTML = renderMiniStats([
    { label:"Tips levert", value:predictions.length },
    { label:"Poeng", value:tipPoints },
    { label:"Tellende tips", value:scoredTips },
    { label:"Helt riktig", value:exact },
    { label:"Poenggivende", value:outcome },
    { label:"Snitt", value:scoredTips ? round(tipPoints / scoredTips) : "-" }
  ]);

  fantasyStatsEl.innerHTML = `
    ${renderMiniStats([
      { label:"Lag levert", value:userFantasyPicks.length },
      { label:"Kapteiner", value:Object.keys(captainCounts).length },
      { label:"Favorittkaptein", value:favoriteCaptain ? favoriteCaptain.player : "-" }
    ])}

    <div class="profile-list">
      ${userFantasyPicks.slice(0, 6).map(pick => `
        <div class="profile-row">
          <div>
            <strong>${getMatchTitle(pick.match_id, matches)}</strong>
            <div class="match-meta">
              ${pick.player1 || "-"} · ${pick.player2 || "-"} · Kaptein: ${pick.captain || "-"}
            </div>
          </div>
        </div>
      `).join("") || `<div class="small">Ingen fantasyvalg funnet.</div>`}
    </div>
  `;

  favoriteStatsEl.innerHTML = `
    <div class="chip-list">
      ${favoritePlayers.slice(0, 8).map(row =>
        playerChip(row.player, `${row.count}x`)
      ).join("") || `<div class="small">Ingen favoritter ennå.</div>`}
    </div>
  `;

  recentVotesEl.innerHTML = playerVotes.slice(0, 25).map(vote => `
    <div class="profile-row">
      <div>
        <strong>${getMatchTitle(vote.match_id, matches)}</strong>
        <div class="match-meta">
          ${getMatchDate(vote.match_id, matches)} · ${getPlayerDisplayName(vote.player)}
        </div>
      </div>

      <div class="rating-pill">
        ${vote.rating}
      </div>
    </div>
  `).join("") || `<div class="small">Ingen børsstemmer funnet.</div>`;
}

init();
</script>

<style>
.profile-hero {
  margin-bottom:24px;
}

.profile-hero-card {
  display:flex;
  align-items:center;
  gap:24px;
  padding:26px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:28px;
  box-shadow:0 12px 35px rgba(0,0,0,0.32);
}

.profile-avatar {
  width:112px;
  height:112px;
  border-radius:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:58px;
  font-weight:900;
  background:linear-gradient(135deg, var(--gold), rgba(255,255,255,0.15));
  color:#111827;
}

.profile-hero-card h1 {
  margin:10px 0 6px;
}

.stat-grid {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:14px;
}

.mini-stat {
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
}

.mini-stat span {
  display:block;
  margin-bottom:8px;
  color:var(--muted);
  font-size:13px;
}

.mini-stat strong {
  font-size:28px;
}

.profile-list,
.chip-list {
  margin-top:14px;
  display:grid;
  gap:10px;
}

.profile-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
}

.rating-pill {
  min-width:50px;
  text-align:center;
  font-weight:900;
  font-size:20px;
  padding:8px 10px;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  color:var(--gold);
}

.player-chip {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  color:inherit;
  text-decoration:none;
  transition:0.15s ease;
}

.player-chip:hover {
  transform:translateY(-1px);
  background:rgba(255,255,255,0.09);
}

.player-chip img {
  width:42px;
  height:42px;
  border-radius:12px;
  object-fit:cover;
  object-position:center top;
  background:white;
}

.player-chip span {
  flex:1;
}

.player-chip strong {
  color:var(--gold);
}

@media(max-width:700px) {
  .profile-hero-card {
    flex-direction:column;
    text-align:center;
  }

  .profile-avatar {
    width:88px;
    height:88px;
    font-size:44px;
  }

  .stat-grid {
    grid-template-columns:1fr 1fr;
  }

  .profile-row {
    align-items:flex-start;
  }
}
</style>

</body>
</html>
