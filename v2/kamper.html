<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lynbørs 2.0 • Kamparkiv</title>

  <link rel="icon" href="../lblogoen.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div id="navbar"></div>

<main class="page-wrap">

  <section class="page-header">
    <div class="badge">KAMPARKIV</div>

    <h1>Kamper</h1>

    <p>
      Kommende kamper, resultater og grunnmotoren bak hele Lynbørs.
    </p>
  </section>

  <section class="data-grid">

    <div class="data-card">
      <h2>Kommende kamper</h2>
      <div id="upcomingMatches" class="match-list">Laster...</div>
    </div>

    <div class="data-card">
      <h2>Siste resultater</h2>
      <div id="completedMatches" class="match-list">Laster...</div>
    </div>

  </section>

</main>

<div id="footer"></div>

<script type="module">
import { renderNavbar, renderFooter } from "./js/layout.js";
import { fetchMatches } from "./js/matches.js";
import { formatShortDate, getActualScore } from "./js/utils.js";

document.getElementById("navbar").innerHTML = renderNavbar("kamper");
document.getElementById("footer").innerHTML = renderFooter();

const upcomingEl = document.getElementById("upcomingMatches");
const completedEl = document.getElementById("completedMatches");

function formatDeadline(value) {
  if (!value) return "Ikke satt";

  try {
    return formatShortDate(value);
  } catch {
    return String(value);
  }
}

async function init() {
  const matches = await fetchMatches();

  const upcoming = matches
    .filter(match =>
      match.active === true &&
      match.actual_home === null &&
      match.actual_away === null
    )
    .sort((a, b) => new Date(a.date || a.deadline) - new Date(b.date || b.deadline));

  const completed = matches
    .filter(match =>
      match.actual_home !== null &&
      match.actual_home !== undefined &&
      match.actual_away !== null &&
      match.actual_away !== undefined
    )
    .sort((a, b) => new Date(b.date || b.deadline) - new Date(a.date || a.deadline));

  renderUpcoming(upcoming);
  renderCompleted(completed);
}

function renderUpcoming(matches) {
  upcomingEl.innerHTML = matches.length
    ? matches.map(match => `
      <div class="match-item">

        <div>
          <strong>${match.home} - ${match.away}</strong>

          <div class="match-meta">
            ${formatShortDate(match.date)}
          </div>

          <div class="badge-small live">
            Aktiv kamp
          </div>
        </div>

        <div class="match-meta">
          Deadline:<br>
          ${formatDeadline(match.deadline)}
        </div>

      </div>
    `).join("")
    : `<div class="match-meta">Ingen kommende kamper.</div>`;
}

function renderCompleted(matches) {
  completedEl.innerHTML = matches.length
    ? matches.slice(0, 10).map(match => {
      const score = getActualScore(match);

      return `
        <div class="match-item">

          <div>
            <strong>${match.home} - ${match.away}</strong>

            <div class="match-meta">
              ${formatShortDate(match.date)}
            </div>

            <div class="badge-small done">
              Ferdigspilt
            </div>
          </div>

          <div class="match-score">
            ${score.home} - ${score.away}
          </div>

        </div>
      `;
    }).join("")
    : `<div class="match-meta">Ingen resultater ennå.</div>`;
}

init();
</script>

</body>
</html>
