<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lynbørs 2.0 • Stem</title>

  <link rel="icon" href="../lblogoen.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div id="navbar"></div>

<main class="page-wrap">

  <section class="page-header">
    <div class="badge">NY STEMMING</div>
    <h1>Spillerbørs</h1>
    <p>Velg kamp, skriv brukernavn og sett børsen. Gamle stemmer lastes automatisk hvis de finnes.</p>
  </section>

  <section class="data-card">
    <h2>Velg kamp</h2>
    <select id="matchSelect" class="match-select"></select>
    <div id="matchInfo"></div>
  </section>

  <section class="data-card">
    <div class="section-head">
      <h2>Dine karakterer</h2>
      <div id="voteProgress" class="vote-progress">0 av 0 spillere vurdert</div>
    </div>

    <div class="quick-actions">
      <button type="button" class="quick-btn" data-fill="5">Alle 5</button>
      <button type="button" class="quick-btn" data-fill="6">Alle 6</button>
      <button type="button" class="quick-btn" data-fill="7">Alle 7</button>
    </div>

    <div id="loadStatus" class="load-status"></div>

    <div class="vote-grid" id="voteGrid">
      Laster spillere...
    </div>
  </section>

  <section class="submit-wrap">
    <input
      type="text"
      id="username"
      placeholder="Ditt navn"
      class="name-input"
      autocomplete="nickname"
    >

    <button id="clearBtn" class="clear-btn" type="button">
      Nullstill
    </button>

    <button id="submitBtn" class="submit-btn" type="button">
      Send børs
    </button>
  </section>

</main>

<div id="footer"></div>

<script type="module">
import { renderNavbar, renderFooter } from "./js/layout.js";
import { fetchMatches } from "./js/matches.js";
import { players, getPlayerDisplayName } from "./js/players.js";
import { supabaseClient } from "./js/supabase.js";

document.getElementById("navbar").innerHTML = renderNavbar("stem");
document.getElementById("footer").innerHTML = renderFooter();

const matchSelectEl = document.getElementById("matchSelect");
const matchInfoEl = document.getElementById("matchInfo");
const voteGridEl = document.getElementById("voteGrid");
const voteProgressEl = document.getElementById("voteProgress");
const loadStatusEl = document.getElementById("loadStatus");
const usernameEl = document.getElementById("username");
const submitBtn = document.getElementById("submitBtn");
const clearBtn = document.getElementById("clearBtn");

let relevantMatches = [];
let activeMatch = null;
let votingClosed = false;

const TIP_PLAYERS = [
  "TIP_HOME_GOALS",
  "TIP_AWAY_GOALS"
];

const POSITION_LABELS = {
  KEEPER: "Keeper",
  FORS: "Forsvar",
  MID: "Midtbane",
  ANG: "Angrep"
};

const POSITION_ORDER = [
  "KEEPER",
  "FORS",
  "MID",
  "ANG"
];

async function init() {
  const savedName = localStorage.getItem("lynbors-voter-name");
  if (savedName) usernameEl.value = savedName;

  const matches = await fetchMatches();

  relevantMatches = matches
    .filter(match => match.active === true || match.actual_home !== null)
    .reverse();

  if (!relevantMatches.length) {
    matchSelectEl.innerHTML = `<option>Ingen kamper funnet</option>`;
    voteGridEl.innerHTML = `<div class="match-meta">Ingen kamper tilgjengelig.</div>`;
    return;
  }

  matchSelectEl.innerHTML = relevantMatches.map(match => {
    const label = match.active ? " • åpen" : "";
    return `
      <option value="${match.id}">
        ${match.home} - ${match.away}${label}
      </option>
    `;
  }).join("");

  activeMatch = relevantMatches[0];

  renderMatchInfo();
  renderVoteGrid();
  restoreDraft();
  await loadExistingVotes(usernameEl.value.trim());

  matchSelectEl.addEventListener("change", async () => {
    activeMatch = relevantMatches.find(match => match.id === matchSelectEl.value);
    renderMatchInfo();
    renderVoteGrid();
    restoreDraft();
    await loadExistingVotes(usernameEl.value.trim());
  });

  usernameEl.addEventListener("input", debounce(async () => {
    const voter = usernameEl.value.trim();
    localStorage.setItem("lynbors-voter-name", voter);
    clearRatings();
    restoreDraft();
    await loadExistingVotes(voter);
  }, 350));

  submitBtn.addEventListener("click", submitVotes);

  clearBtn.addEventListener("click", () => {
    clearRatings();
    clearDraft();
    setStatus("Skjema nullstilt.", "neutral");
  });

  document.querySelectorAll(".quick-btn").forEach(button => {
    button.addEventListener("click", () => {
      if (votingClosed) return;
      fillAllRatings(Number(button.dataset.fill));
    });
  });
}

function renderMatchInfo() {
  if (!activeMatch) return;

  votingClosed = isVotingClosed(activeMatch);

  const resultText =
    activeMatch.actual_home !== null && activeMatch.actual_away !== null
      ? `${activeMatch.actual_home} - ${activeMatch.actual_away}`
      : "Ikke spilt";

  const statusText = votingClosed
    ? "Stengt"
    : "Åpen for stemming";

  const statusClass = votingClosed
    ? "closed"
    : "open";

  matchInfoEl.innerHTML = `
    <div class="active-match-box">
      <div>
        <div class="match-title-row">
          <strong>${activeMatch.home} - ${activeMatch.away}</strong>
          <span class="match-status ${statusClass}">${statusText}</span>
        </div>

        <div class="match-meta">
          Deadline: ${formatDeadline(activeMatch.deadline)}
        </div>
      </div>

      <div class="match-result">
        ${resultText}
      </div>
    </div>
  `;

  submitBtn.disabled = votingClosed;
  submitBtn.textContent = votingClosed ? "Stengt" : "Send børs";
}

function renderVoteGrid() {
  const sortedPlayers = [...players]
    .sort((a, b) => (a.order ?? 999) - (b.order ?? 999));

  voteGridEl.innerHTML = sortedPlayers.map(player => `
    <div class="vote-card">
      <div class="vote-player">
        <img
          src="${player.image}"
          class="vote-avatar"
          onerror="this.src='../lblogoen.png'"
        >

        <div>
          <strong>${getPlayerDisplayName(player.name)}</strong>
          <div class="match-meta">${player.position} • ${player.short}</div>
        </div>
      </div>

      <div class="rating-buttons" data-player="${player.short}">
        ${Array.from({ length: 10 }, (_, i) => {
          const value = i + 1;
          return `
            <button
              class="rating-btn"
              data-value="${value}"
              type="button"
              ${votingClosed ? "disabled" : ""}
            >
              ${value}
            </button>
          `;
        }).join("")}
      </div>
    </div>
  `).join("");

  setupRatingButtons();
  updateProgress();
}

function setupRatingButtons() {
  document.querySelectorAll(".rating-btn").forEach(button => {
    button.addEventListener("click", () => {
      if (votingClosed) return;

      const wrapper = button.closest(".rating-buttons");
      const value = button.dataset.value;

      if (wrapper.dataset.rating === value) {
        wrapper.dataset.rating = "";
        button.classList.remove("active");
      } else {
        wrapper.querySelectorAll(".rating-btn").forEach(btn => {
          btn.classList.remove("active");
        });

        wrapper.dataset.rating = value;
        button.classList.add("active");
      }

      updateProgress();
      saveDraft();
    });
  });
}

async function loadExistingVotes(voter) {
  if (!voter || !activeMatch) {
    setStatus("Skriv inn brukernavn for å hente gamle stemmer.", "neutral");
    return;
  }

  setStatus("Sjekker gamle stemmer...", "neutral");

  const { data, error } = await supabaseClient
    .from("votes")
    .select("*")
    .eq("match_id", activeMatch.id)
    .eq("voter", voter);

  if (error) {
    console.error(error);
    setStatus("Klarte ikke hente gamle stemmer.", "bad");
    return;
  }

  const playerVotes = (data || []).filter(vote =>
    !TIP_PLAYERS.includes(vote.player)
  );

  if (!playerVotes.length) {
    setStatus("Ingen gamle spillerstemmer funnet for denne brukeren/kampen.", "neutral");
    updateProgress();
    return;
  }

  clearRatings(false);

  document.querySelectorAll(".rating-buttons").forEach(wrapper => {
    const existing = playerVotes.find(vote =>
      vote.player === wrapper.dataset.player
    );

    if (!existing) return;

    setRating(wrapper, existing.rating);
  });

  setStatus(`Fant ${playerVotes.length} gamle stemmer.`, "good");
  updateProgress();
  saveDraft();
}

async function submitVotes() {
  const voter = usernameEl.value.trim();

  if (!voter) {
    alert("Skriv inn navn.");
    return;
  }

  if (!activeMatch) {
    alert("Ingen kamp valgt.");
    return;
  }

  if (votingClosed) {
    alert("Stemmegivning er stengt for denne kampen.");
    return;
  }

  const ratings = [...document.querySelectorAll(".rating-buttons")]
    .map(wrapper => ({
      match_id: activeMatch.id,
      voter,
      player: wrapper.dataset.player,
      rating: Number(wrapper.dataset.rating)
    }))
    .filter(row => row.rating);

  if (!ratings.length) {
    alert("Ingen karakterer valgt.");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "Lagrer...";
  setStatus("Lagrer børs...", "neutral");

  const { error: deleteError } = await supabaseClient
    .from("votes")
    .delete()
    .eq("match_id", activeMatch.id)
    .eq("voter", voter)
    .not("player", "in", '("TIP_HOME_GOALS","TIP_AWAY_GOALS")');

  if (deleteError) {
    console.error(deleteError);
    alert("Klarte ikke slette gamle spillerstemmer.");
    submitBtn.disabled = false;
    submitBtn.textContent = "Send børs";
    setStatus("Noe gikk galt ved lagring.", "bad");
    return;
  }

  const { error: insertError } = await supabaseClient
    .from("votes")
    .insert(ratings);

  if (insertError) {
    console.error(insertError);
    alert("Noe gikk galt ved lagring.");
    submitBtn.disabled = false;
    submitBtn.textContent = "Send børs";
    setStatus("Noe gikk galt ved lagring.", "bad");
    return;
  }

  localStorage.setItem("lynbors-voter-name", voter);
  clearDraft();

  submitBtn.disabled = false;
  submitBtn.textContent = "Lagret!";
  setStatus(`Børs lagret med ${ratings.length} spillere. Jess!`, "good");

  setTimeout(() => {
    submitBtn.textContent = "Send børs";
  }, 1800);
}

function setRating(wrapper, value) {
  wrapper.dataset.rating = String(value);

  wrapper.querySelectorAll(".rating-btn").forEach(button => {
    button.classList.toggle(
      "active",
      button.dataset.value === String(value)
    );
  });
}

function fillAllRatings(value) {
  document.querySelectorAll(".rating-buttons").forEach(wrapper => {
    setRating(wrapper, value);
  });

  updateProgress();
  saveDraft();
  setStatus(`Alle spillere satt til ${value}.`, "neutral");
}

function clearRatings(showStatus = true) {
  document.querySelectorAll(".rating-buttons").forEach(wrapper => {
    wrapper.dataset.rating = "";
    wrapper.querySelectorAll(".rating-btn").forEach(button => {
      button.classList.remove("active");
    });
  });

  updateProgress();

  if (showStatus) {
    setStatus("", "neutral");
  }
}

function updateProgress() {
  const selected = [...document.querySelectorAll(".rating-buttons")]
    .filter(wrapper => Number(wrapper.dataset.rating))
    .length;

  const total = document.querySelectorAll(".rating-buttons").length;

  voteProgressEl.textContent =
    `${selected} av ${total} spillere vurdert`;
}

function setStatus(message, type = "neutral") {
  loadStatusEl.textContent = message;
  loadStatusEl.className = `load-status ${type}`;
}

function getDraftKey() {
  const voter = usernameEl.value.trim() || "anonymous";
  const matchId = activeMatch?.id || "no-match";
  return `lynbors-draft-${matchId}-${voter}`;
}

function saveDraft() {
  if (!activeMatch) return;

  const draft = [...document.querySelectorAll(".rating-buttons")]
    .map(wrapper => ({
      player: wrapper.dataset.player,
      rating: Number(wrapper.dataset.rating)
    }))
    .filter(row => row.rating);

  localStorage.setItem(getDraftKey(), JSON.stringify(draft));
}

function restoreDraft() {
  if (!activeMatch) return;

  const raw = localStorage.getItem(getDraftKey());
  if (!raw) return;

  let draft = [];

  try {
    draft = JSON.parse(raw);
  } catch {
    return;
  }

  document.querySelectorAll(".rating-buttons").forEach(wrapper => {
    const saved = draft.find(row => row.player === wrapper.dataset.player);
    if (saved) setRating(wrapper, saved.rating);
  });

  updateProgress();

  if (draft.length) {
    setStatus(`Fant lokalt utkast med ${draft.length} spillere.`, "neutral");
  }
}

function clearDraft() {
  localStorage.removeItem(getDraftKey());
}

function isVotingClosed(match) {
  if (!match?.deadline) return false;

  const deadline = new Date(match.deadline);
  if (Number.isNaN(deadline.getTime())) return false;

  return new Date() > deadline;
}

function formatDeadline(deadline) {
  if (!deadline) return "Ikke satt";

  const date = new Date(deadline);
  if (Number.isNaN(date.getTime())) return deadline;

  return date.toLocaleString("no-NO", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function debounce(fn, delay = 300) {
  let timeout;

  return (...args) => {
    clearTimeout(timeout);
    timeout = setTimeout(() => fn(...args), delay);
  };
}

init();
</script>

<style>
.match-select {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:16px;
}

.active-match-box {
  margin-top:14px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:center;
}

.match-title-row {
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.match-status {
  padding:5px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.match-status.open {
  background:rgba(34,197,94,0.18);
  color:#bbf7d0;
}

.match-status.closed {
  background:rgba(239,68,68,0.18);
  color:#fecaca;
}

.match-result {
  font-size:28px;
  font-weight:bold;
  color:var(--gold);
  white-space:nowrap;
}

.section-head {
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  margin-bottom:12px;
}

.section-head h2 {
  margin:0;
}

.vote-progress {
  padding:7px 11px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
  color:var(--muted);
  font-size:13px;
  font-weight:bold;
}

.quick-actions {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:12px;
}

.quick-btn {
  border:none;
  border-radius:999px;
  padding:8px 12px;
  background:rgba(255,255,255,0.10);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.quick-btn:hover {
  background:rgba(255,255,255,0.18);
}

.load-status {
  min-height:22px;
  margin-bottom:12px;
  color:var(--muted);
  font-size:14px;
}

.load-status.good {
  color:#bbf7d0;
}

.load-status.bad {
  color:#fecaca;
}

.vote-grid {
  display:grid;
  grid-template-columns:1fr;
  gap:18px;
}

.position-group {
  display:grid;
  gap:12px;
}

.position-title {
  margin-top:4px;
  color:var(--gold);
  font-weight:bold;
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-size:13px;
}

.vote-card {
  display:grid;
  grid-template-columns:1fr auto;
  gap:14px;
  align-items:center;
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
}

.vote-player {
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}

.vote-avatar {
  width:52px;
  height:52px;
  min-width:52px;
  object-fit:cover;
  object-position:center top;
  border-radius:12px;
  background:white;
}

.rating-buttons {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:flex-end;
}

.rating-btn {
  width:34px;
  height:34px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.10);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.rating-btn:hover {
  background:rgba(255,255,255,0.20);
}

.rating-btn.active {
  background:var(--gold);
  color:black;
}

.rating-btn:disabled {
  opacity:0.35;
  cursor:not-allowed;
}

.submit-wrap {
  position:sticky;
  bottom:0;
  z-index:20;
  display:flex;
  gap:12px;
  margin-top:22px;
  padding:18px;
  border-radius:22px;
  background:rgba(5,8,20,0.92);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.10);
}

.name-input {
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:16px;
}

.submit-btn,
.clear-btn {
  padding:14px 22px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
}

.submit-btn {
  background:var(--gold);
  color:black;
}

.submit-btn:disabled {
  opacity:0.55;
  cursor:not-allowed;
}

.clear-btn {
  background:rgba(255,255,255,0.10);
  color:white;
}

@media(max-width:800px) {
  .vote-card {
    grid-template-columns:1fr;
  }

  .rating-buttons {
    justify-content:flex-start;
  }

  .rating-btn {
    width:38px;
    height:38px;
  }

  .submit-wrap {
    flex-direction:column;
  }

  .active-match-box {
    flex-direction:column;
    align-items:flex-start;
  }

  .section-head {
    flex-direction:column;
    align-items:flex-start;
  }

  .match-result {
    font-size:24px;
  }
}
</style>

</body>
</html>
