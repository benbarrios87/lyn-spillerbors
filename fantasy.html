<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyn Fantasy</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:url("bakgrunn.jpg.webp") center/cover no-repeat fixed;
  color:white;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.container {
  max-width:750px;
  margin:0 auto;
  padding:30px 20px;
}

.card {
  background:rgba(0,0,0,0.72);
  border-radius:20px;
  padding:25px;
  margin-top:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.35);
}

h1, h2 {
  text-align:center;
}

.match-box {
  background:#13294b;
  border:2px solid #d71920;
  text-align:center;
}

.match-title {
  font-size:22px;
  font-weight:bold;
}

.match-date {
  margin-top:8px;
  opacity:0.85;
}

.rules ul {
  padding-left:20px;
  line-height:1.6;
}

select, input, button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  font-size:16px;
  box-sizing:border-box;
}

button {
  background:#d71920;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#b9151b;
}

.select-row {
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:10px;
}

.select-row img {
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:50%;
  background:white;
  flex-shrink:0;
}

.result {
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  padding:18px;
  border-radius:12px;
  line-height:1.7;
}

.captain-line {
  background:rgba(215,25,32,0.25);
  border:1px solid rgba(215,25,32,0.8);
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-weight:bold;
}

.points-box {
  margin-top:18px;
  background:rgba(255,255,255,0.12);
  border-radius:12px;
  padding:15px;
}

.total-points {
  font-size:26px;
  font-weight:bold;
  text-align:center;
  margin-top:10px;
}

.breakdown {
  margin-top:12px;
  font-size:15px;
}

.small {
  opacity:0.8;
  font-size:14px;
  text-align:center;
}

.locked {
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.35);
  padding:12px;
  border-radius:12px;
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}

label {
  display:block;
  margin-top:15px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Lyn Fantasy</h1>

<div class="card match-box">
<div>Neste fantasy-kamp</div>
<div class="match-title" id="matchTitle"></div>
<div class="match-date" id="matchDate"></div>
</div>

<div class="card">
<h2>Ditt lag</h2>

<div id="lockMessage"></div>

<label for="username">Forumbrukernavn</label>
<input id="username" placeholder="Forumbrukernavn">

<label for="player1">Spiller 1</label>
<div class="select-row">
<img id="img-player1" src="bilder/lyn-logo.png">
<select id="player1"></select>
</div>

<label for="player2">Spiller 2</label>
<div class="select-row">
<img id="img-player2" src="bilder/lyn-logo.png">
<select id="player2"></select>
</div>

<label for="captain">Kaptein ⭐</label>
<div class="select-row">
<img id="img-captain" src="bilder/lyn-logo.png">
<select id="captain"></select>
</div>

<button id="saveBtn" onclick="saveTeam()">Lagre fantasy-lag</button>

<div id="output" class="result" style="display:none;"></div>

</div>
</div>

<script>

const matchesData = [
{ id:"10.05 Raufoss - Lyn", date:"2026-05-10", home:"Raufoss", away:"Lyn", deadline:"2026-05-10T18:00:00", actual:null }
];

const players = [
{ name: "Pedersen", position: "KEEPER", image: "bilder/pedersen.png" },
{ name: "Sah", position: "FORS", image: "bilder/sah.png" },
{ name: "Sell", position: "FORS", image: "bilder/sell.png" },
{ name: "Midtskogen", position: "FORS", image: "bilder/midtskogen.png" },
{ name: "HSN", position: "FORS", image: "bilder/hsn.png" },
{ name: "Barnett", position: "FORS", image: "bilder/barnett.png" },
{ name: "Fredriksen", position: "MID", image: "bilder/fredriksen.png" },
{ name: "Isufi", position: "MID", image: "bilder/isufi.png" },
{ name: "Skaug", position: "MID", image: "bilder/skaug.png" },
{ name: "Kurtovic", position: "MID", image: "bilder/kurtovic.png" },
{ name: "Monglo", position: "MID", image: "bilder/monglo.png" },
{ name: "Wæhler", position: "MID", image: "bilder/wæhler.png" },
{ name: "Abo", position: "ANG", image: "bilder/abo.png" },
{ name: "MJ", position: "ANG", image: "bilder/mj.png" },
{ name: "Hellum", position: "ANG", image: "bilder/hellum.png" },
{ name: "Sawaneh", position: "ANG", image: "bilder/sawaneh.png" },
{ name: "Sock", position: "ANG", image: "bilder/sock.png" },
{ name: "Vik", position: "KEEPER", image: "bilder/vik.png" },
{ name: "Trige", position: "KEEPER", image: "bilder/trige.png" }
];

let matchStats = {};

function getNextMatch() {
const now = new Date();

return matchesData
.filter(match => new Date(match.deadline) > now)
.sort((a,b) => new Date(a.deadline) - new Date(b.deadline))[0];
}

const nextMatch = getNextMatch();

async function loadMatchStats() {

if (!nextMatch) return;

const { data, error } = await supabaseClient
.from("fantasy_stats")
.select("*")
.eq("match_id", nextMatch.id);

if (error) {
console.error(error);
return;
}

matchStats = {};

data.forEach(row => {
matchStats[row.player] = {
goals: row.goals || 0,
assists: row.assists || 0,
cleanSheet: row.clean_sheet || false,
penaltySave: row.penalty_save || false,
redCard: row.red_card || false,
rating: row.rating || 0
};
});
}

function fillMatchInfo() {

if (!nextMatch) return;

document.getElementById("matchTitle").textContent =
`${nextMatch.home} - ${nextMatch.away}`;

document.getElementById("matchDate").textContent =
`${nextMatch.date}`;
}

function fillSelects() {

["player1","player2","captain"].forEach(id => {

const select = document.getElementById(id);

select.innerHTML = `<option value="">Velg spiller</option>`;

players.forEach(player => {

select.innerHTML += `
<option value="${player.name}">
${player.name} (${player.position})
</option>
`;
});
});
}

function getPlayer(playerName) {
return players.find(p => p.name === playerName);
}

function getPlayerPosition(playerName) {
const player = getPlayer(playerName);
return player ? player.position : "";
}

function updatePlayerImages() {

["player1","player2","captain"].forEach(id => {

const select = document.getElementById(id);

const image = document.getElementById(`img-${id}`);

const player = getPlayer(select.value);

image.src = player
? player.image
: "bilder/lyn-logo.png";
});
}

function calculatePoints(playerName, isCaptain) {

const stat = matchStats[playerName];

const position = getPlayerPosition(playerName);

if (!stat) {
return { total:0, lines:["Ingen kampdata"] };
}

let points = 0;
const lines = [];

if (stat.goals > 0) {

let goalPoints = 0;

if (position === "ANG") goalPoints = stat.goals * 4;
if (position === "MID") goalPoints = stat.goals * 5;
if (position === "FORS") goalPoints = stat.goals * 6;
if (position === "KEEPER") goalPoints = stat.goals * 10;

points += goalPoints;

lines.push(`Mål: +${goalPoints}`);
}

if (stat.assists > 0) {

const assistPoints = stat.assists * 3;

points += assistPoints;

lines.push(`Assist: +${assistPoints}`);
}

if (stat.cleanSheet) {

let csPoints = 0;

if (position === "MID") csPoints = 1;
if (position === "FORS") csPoints = 4;
if (position === "KEEPER") csPoints = 5;

if (csPoints > 0) {
points += csPoints;
lines.push(`Clean sheet: +${csPoints}`);
}
}

if (stat.penaltySave && position === "KEEPER") {
points += 5;
lines.push("Strafferedning: +5");
}

if (stat.redCard) {
points -= 3;
lines.push("Rødt kort: −3");
}

if (stat.rating >= 7.5) {
points += 1;
lines.push("Børsbonus: +1");
}

if (stat.rating <= 4.5) {
points -= 1;
lines.push("Børsbonus: −1");
}

if (isCaptain) {
points += 2;
lines.push("Kaptein: +2");
}

return {
total: points,
lines
};
}

async function saveTeam() {

const username =
document.getElementById("username").value.trim();

const player1 =
document.getElementById("player1").value;

const player2 =
document.getElementById("player2").value;

const captain =
document.getElementById("captain").value;

if (!username || !player1 || !player2 || !captain) {
alert("Fyll inn alt");
return;
}

if (
new Set([player1, player2, captain]).size !== 3
) {
alert("Tre ulike spillere");
return;
}

const team = {
match_id: nextMatch.id,
username,
player1,
player2,
captain
};

localStorage.setItem(
"lynFantasyTeam",
JSON.stringify(team)
);

const { error } = await supabaseClient
.from("fantasy_picks")
.upsert(
{
match_id: team.match_id,
voter: team.username,
player1: team.player1,
player2: team.player2,
captain: team.captain
},
{
onConflict: "match_id,voter"
}
);

if (error) {
console.error(error);
alert("Noe gikk galt");
return;
}

alert("Fantasy-laget er lagret!");

showTeam(team);
}

function showTeam(team) {

const output = document.getElementById("output");

output.style.display = "block";

const p1 = calculatePoints(team.player1,false);
const p2 = calculatePoints(team.player2,false);
const cap = calculatePoints(team.captain,true);

const total =
p1.total +
p2.total +
cap.total;

output.innerHTML = `
<strong>${team.username}</strong><br><br>

${team.player1}: ${p1.total} poeng<br>
${team.player2}: ${p2.total} poeng<br>
⭐ ${team.captain}: ${cap.total} poeng<br><br>

<div class="total-points">
${total} poeng
</div>
`;
}

fillMatchInfo();
fillSelects();

["player1","player2","captain"].forEach(id => {
document
.getElementById(id)
.addEventListener("change", updatePlayerImages);
});

loadMatchStats();

updatePlayerImages();

</script>

</body>
</html>
