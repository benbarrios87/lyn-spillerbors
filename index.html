<script>
const SUPABASE_URL = "https://oqwlbdnthdbomnobxqot.supabase.co";
const SUPABASE_KEY = "sb_publishable_7rvKgvaG_Op8qN0R9CWdAA_RATzpP4z";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const AWAY_FANS_PLAYER = "Bortefeltet";
const TIP_HOME_PLAYER = "TIP_HOME_GOALS";
const TIP_AWAY_PLAYER = "TIP_AWAY_GOALS";

let globalMatches = [];

function cleanVoterName(name) {
  return (name || "").trim().toLowerCase();
}

function getStoredForumName() {
  return (
    localStorage.getItem("lynbors_voter") ||
    ""
  ).trim();
}

function setStoredForumName(name) {
  localStorage.setItem("lynbors_voter", (name || "").trim());
}

function saveForumName() {
  const input = document.getElementById("forumNameInput");

  if (!input) return;

  const value = input.value.trim();

  if (!value) {
    alert("Skriv inn forumnavnet ditt.");
    return;
  }

  setStoredForumName(value);

  renderIdentity();
  loadNextMatchWidget();
}

function renderIdentity() {
  const input = document.getElementById("forumNameInput");
  const status = document.getElementById("identityStatus");

  const name = getStoredForumName();

  if (input && name) {
    input.value = name;
  }

  if (status) {
    status.textContent = name
      ? `Lagret som ${name}`
      : "Ikke satt";
  }
}

function parseLocalDateTime(value) {
  if (!value) return null;

  return new Date(
    String(value)
      .replace("Z","")
      .replace("+00:00","")
  );
}

function getMatchData(matchId) {
  return globalMatches.find(m => m.id === matchId) || null;
}

function isRealMatch(v) {
  return v.match_id && v.match_id !== "TEST";
}

function isPredictionVote(v) {
  return (
    isRealMatch(v) &&
    (
      v.player === TIP_HOME_PLAYER ||
      v.player === TIP_AWAY_PLAYER
    )
  );
}

function decodeGoals(value) {
  return Number(value) - 1;
}

async function fetchVotes(query = "") {

  const joiner = query ? "&" : "?";

  const response = await fetch(
    SUPABASE_URL +
      "/rest/v1/votes" +
      query +
      joiner +
      "order=created_at.desc&limit=10000",
    {
      headers:{
        apikey:SUPABASE_KEY,
        Authorization:"Bearer " + SUPABASE_KEY
      }
    }
  );

  if (!response.ok) {
    console.error(await response.text());
    return [];
  }

  return await response.json();
}

function buildPredictions(votes) {

  const map = {};

  votes
    .filter(isPredictionVote)
    .forEach(v => {

      const voter = cleanVoterName(v.voter);

      const key =
        `${v.match_id}|||${voter}`;

      if (!map[key]) {
        map[key] = {
          match_id:v.match_id,
          voter,
          home:null,
          away:null
        };
      }

      if (v.player === TIP_HOME_PLAYER) {
        map[key].home = decodeGoals(v.rating);
      }

      if (v.player === TIP_AWAY_PLAYER) {
        map[key].away = decodeGoals(v.rating);
      }
    });

  return Object
    .values(map)
    .filter(p => p.home !== null && p.away !== null);
}

function formatNiceDateTime(value) {

  const d = parseLocalDateTime(value);

  if (!d) return "Ikke satt";

  return d.toLocaleString("no-NO", {
    weekday:"short",
    day:"2-digit",
    month:"2-digit",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function getCountdownText(value) {

  const target = parseLocalDateTime(value);

  if (!target) return "";

  const diff = target - new Date();

  if (diff <= 0) {
    return "Frist utløpt";
  }

  const totalMinutes =
    Math.floor(diff / (1000 * 60));

  const days =
    Math.floor(totalMinutes / (60 * 24));

  const hours =
    Math.floor((totalMinutes / 60) % 24);

  const minutes =
    totalMinutes % 60;

  if (days > 0) {
    return `${days} dager · ${hours} timer igjen`;
  }

  if (hours > 0) {
    return `${hours} timer · ${minutes} min igjen`;
  }

  return `${minutes} min igjen`;
}

function getMatchTeamLabel(match) {
  return match.team === "women"
    ? "Lyn kvinner"
    : "Lyn herrer";
}

function renderMyDeliveries(
  match,
  myPrediction,
  myFantasyPick
) {

  const box =
    document.getElementById("myDeliveries");

  if (!box) return;

  const storedName =
    getStoredForumName();

  if (!storedName) {

    box.innerHTML = `
      <div class="my-deliveries-title">
        Mine leveringer
      </div>

      <div class="delivery-empty">
        Skriv forumnavnet ditt over.
      </div>
    `;

    return;
  }

  const rows = [];

  if (myPrediction) {

    rows.push(`
      <div class="delivery-row">
        <div class="delivery-icon">⚽</div>

        <div>
          <div class="delivery-main">
            ${match.home}
            ${myPrediction.home}-${myPrediction.away}
            ${match.away}
          </div>

          <div class="delivery-sub">
            Tippetips levert
          </div>
        </div>

        <a class="delivery-action"
           href="tippetips.html">
           Endre
        </a>
      </div>
    `);

  } else {

    rows.push(`
      <div class="delivery-row">
        <div class="delivery-icon">⚽</div>

        <div>
          <div class="delivery-main">
            Ikke levert tips ennå
          </div>

          <div class="delivery-sub">
            Fristen er åpen
          </div>
        </div>

        <a class="delivery-action"
           href="tippetips.html">
           Lever
        </a>
      </div>
    `);
  }

  if (myFantasyPick) {

    rows.push(`
      <div class="delivery-row">
        <div class="delivery-icon">⭐</div>

        <div>
          <div class="delivery-main">
            ${myFantasyPick.player1}
            ·
            ${myFantasyPick.player2}
            · ⭐
            ${myFantasyPick.captain}
          </div>

          <div class="delivery-sub">
            Fantasy-lag levert
          </div>
        </div>

        <a class="delivery-action"
           href="fantasy.html">
           Endre
        </a>
      </div>
    `);
  }

  box.innerHTML = `
    <div class="my-deliveries-title">
      Mine leveringer · ${storedName}
    </div>

    ${rows.join("")}
  `;
}

async function loadNextMatchWidget() {

  const box =
    document.getElementById("nextMatchWidget");

  if (!box) return;

  try {

    const { data:matches, error } =
      await supabaseClient
        .from("matches")
        .select("*")
        .eq("active", true)
        .order("deadline", {
          ascending:true
        });

    if (error) {
      throw error;
    }

    globalMatches = matches || [];

    const now = new Date();

    const upcoming =
      globalMatches
        .filter(m =>
          parseLocalDateTime(
            m.deadline || m.date
          ) > now
        )
        .sort((a,b) =>
          parseLocalDateTime(a.deadline || a.date) -
          parseLocalDateTime(b.deadline || b.date)
        )[0];

    if (!upcoming) {

      box.innerHTML = `
        <div class="next-loading">
          Ingen kommende kamp.
        </div>
      `;

      return;
    }

    const allVotes =
      await fetchVotes();

    const predictions =
      buildPredictions(allVotes)
        .filter(p =>
          p.match_id === upcoming.id
        );

    const uniqueTipsters =
      new Set(
        predictions.map(p =>
          cleanVoterName(p.voter)
        )
      );

    const storedName =
      cleanVoterName(
        getStoredForumName()
      );

    const myPrediction =
      predictions.find(p =>
        cleanVoterName(p.voter) === storedName
      );

    let myFantasyPick = null;
    let fantasyCount = 0;

    if (upcoming.team !== "women") {

      const { data:fantasyPicks } =
        await supabaseClient
          .from("fantasy_picks")
          .select("*")
          .eq("match_id", upcoming.id);

      fantasyCount =
        (fantasyPicks || []).length;

      myFantasyPick =
        (fantasyPicks || [])
          .find(p =>
            cleanVoterName(p.voter) === storedName
          );
    }

    renderMyDeliveries(
      upcoming,
      myPrediction,
      myFantasyPick
    );

    box.innerHTML = `
      <div class="next-kicker">
        Neste kamp ·
        ${getMatchTeamLabel(upcoming)}
      </div>

      <div class="next-title">
        ${upcoming.home}
        –
        ${upcoming.away}
      </div>

      <div class="next-meta">
        ⏰
        ${formatNiceDateTime(
          upcoming.deadline || upcoming.date
        )}

        <br>

        🔥
        ${getCountdownText(
          upcoming.deadline || upcoming.date
        )}
      </div>

      <div class="next-stats">
        <div class="next-pill">
          ⚽ ${uniqueTipsters.size} tips
        </div>

        ${
          upcoming.team !== "women"
            ? `
              <div class="next-pill">
                ⭐ ${fantasyCount} fantasy-lag
              </div>
            `
            : ""
        }
      </div>

      <div class="next-buttons">

        <button
          class="next-btn primary"
          onclick="location.href='tippetips.html'"
        >
          ⚽ Lever tips
        </button>

        ${
          upcoming.team !== "women"
            ? `
              <button
                class="next-btn secondary"
                onclick="location.href='fantasy.html'"
              >
                ⭐ Fantasy
              </button>
            `
            : ""
        }

      </div>
    `;

  } catch(err) {

    console.error(err);

    box.innerHTML = `
      <div class="next-loading">
        Klarte ikke laste kamp.
      </div>
    `;
  }
}

function init() {
  renderIdentity();
  loadNextMatchWidget();
}

init();
</script>
