<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lynbørs</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:url("bakgrunn.jpg.webp") center/cover no-repeat fixed;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card {
  background:rgba(0,0,0,0.7);
  color:white;
  padding:40px;
  text-align:center;
  border-radius:20px;
  font-size:22px;
  cursor:pointer;
  transition:0.2s;
  backdrop-filter:blur(4px);
}

.card:hover {
  transform:scale(1.05);
  background:rgba(215,25,32,0.9);
}

.vipps-box {
  position:fixed;
  bottom:20px;
  right:20px;
  text-align:center;
  background:rgba(255,255,255,0.95);
  padding:12px;
  border-radius:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.vipps-box img {
  width:90px;
  border-radius:12px;
}

.vipps-box div {
  margin-top:6px;
  font-size:13px;
  color:#444;
}

@media (max-width:700px) {
  .container {
    grid-template-columns:1fr;
    width:90%;
  }

  .card {
    padding:28px;
    font-size:20px;
  }

  .vipps-box {
    bottom:12px;
    right:12px;
    padding:10px;
  }

  .vipps-box img {
    width:75px;
  }

  .vipps-box div {
    font-size:12px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="card" onclick="location.href='bors.html'">Spillerbørs</div>
  <div class="card" onclick="location.href='tippetips.html'">Tippetips</div>
  <div class="card" onclick="location.href='fantasy.html'">Lynfantasy</div>
  <div class="card" onclick="location.href='lynligaen.html'">Lynligaen</div>
</div>

<div class="vipps-box">
  <img src="bilder/vipps.png.png" onerror="this.style.display='none'" alt="Vipps">
  <div>Holder hobbyprosjektet og kaffeforbruket i live ☕</div>
</div>

<script defer src="/_vercel/analytics/script.js"></script>

</body>
</html>
