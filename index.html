<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Lyn spillerbørs</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("bakgrunn.jpg.webp") center/cover no-repeat fixed;
}

/* mørk overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  z-index: -1;
}

header {
  text-align: center;
  padding: 30px;
  color: white;
}

.logo-wrap {
  width: 110px;
  height: 110px;
  margin: 0 auto 10px;
  background: white;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-wrap img {
  width: 85px;
  height: 85px;
  object-fit: contain;
}

h1 {
  margin: 10px 0 5px;
  font-size: 34px;
}

main {
  max-width: 1000px;
  margin: 20px auto;
  padding: 10px;
}

/* glasskort */
.box {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(6px);
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 16px;
}

select, input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 12px;
}

.player {
  text-align: center;
}

.avatar {
  width: 60px;
  height: 60px;
  background: #111;
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-weight: bold;
}

button {
  background: #d71920;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #b51218;
}
</style>
</head>

<body>

<header>
  <div class="logo-wrap">
    <img src="lyn-logo.png">
  </div>
  <h1>Lyn spillerbørs</h1>
  <p>Stem på spillerne etter kamp</p>
</header>

<main>

<div class="box">
<label>Velg kamp</label>
<select id="match">
<option>Moss borte</option>
<option>Sandnes Ulf hjemme</option>
<option>Sogndal borte</option>
<option>Haugesund hjemme</option>
</select>
</div>

<div class="box">
<label>Navn (valgfritt)</label>
<input id="voter">
</div>

<div class="box">
<h2>Spillere</h2>

<div class="grid" id="players"></div>

</div>

<div class="box">
<label>Kommentar</label>
<textarea id="comment"></textarea>
<button onclick="sendVote()">Send inn</button>
</div>

</main>

<script>
const SUPABASE_URL = "https://oqwlbdnthdbomnobxqot.supabase.co";
const SUPABASE_KEY = "sb_publishable_7rvKgvaG_Op8qN0R9CWdAA_RATzpP4z";

const players = [
"Pedersen","SAH","Sell","Midtskogen","HSN",
"Fredriksen","Isufi","Skaug","ABO",
"Sawaneh","Hellum","Kurtovic","Sock",
"Vik","Monglo","Wæhler","Aadland","Hartmann"
];

const playersDiv = document.getElementById("players");

players.forEach(p => {
  playersDiv.innerHTML += `
  <div class="player">
    <div class="avatar">${p.substring(0,2)}</div>
    <div>${p}</div>
    <input type="number" id="${p}" min="1" max="10">
  </div>
  `;
});

async function sendVote() {
  const match = document.getElementById("match").value;
  const voter = document.getElementById("voter").value || "anon";
  const comment = document.getElementById("comment").value;

  let rows = [];

  players.forEach(p => {
    let val = document.getElementById(p).value;
    if(val) {
      rows.push({
        match,
        voter_name: voter,
        player: p,
        rating: Number(val),
        comment
      });
    }
  });

  await fetch(SUPABASE_URL + "/rest/v1/votes", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(rows)
  });

  alert("Sendt!");
}
</script>

</body>
</html>
