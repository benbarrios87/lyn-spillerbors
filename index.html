<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lyn spillerbørs</title>

<style>
:root {
  --red: #d71920;
  --blue: #13294b;
  --white: #ffffff;
  --light: #f8fafc;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("bakgrunn.jpg.webp") center/cover no-repeat fixed;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.62);
  z-index: -1;
}

header {
  text-align: center;
  padding: 40px 20px;
  color: white;
}

.logo-wrap {
  width: 120px;
  height: 120px;
  margin: 0 auto 15px;
  background: white;
  border-radius: 25px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-wrap img {
  width: 90px;
  height: 90px;
  object-fit: contain;
}

h1 {
  margin: 10px 0 5px;
  font-size: 38px;
}

main {
  max-width: 1120px;
  margin: auto;
  padding: 15px;
}

.box {
  background: rgba(255,255,255,0.95);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 18px;
  border-left: 6px solid var(--red);
}

select, input, textarea {
  width: 100%;
  padding: 11px;
  border-radius: 9px;
  border: 1px solid #ccc;
  margin-top: 6px;
  box-sizing: border-box;
  font-size: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
  gap: 12px;
}

.player {
  background: white;
  border-radius: 14px;
  padding: 12px;
  text-align: center;
  border: 1px solid #eee;
}

.avatar {
  width: 64px;
  height: 64px;
  background: var(--blue);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-weight: bold;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.player-short {
  font-weight: bold;
  margin-top: 8px;
}

.player-name {
  font-size: 12px;
  color: gray;
  min-height: 30px;
}

button {
  background: var(--red);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 12px;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #b51218;
}

.result-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  padding: 11px 0;
  border-bottom: 1px solid #eee;
}

.result-score {
  font-weight: bold;
  color: var(--blue);
  font-size: 18px;
}

.bb {
  background: #fff1f2;
  border: 1px solid #fecdd3;
  color: #b51218;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 14px;
  font-weight: bold;
}

.top-three {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.podium {
  background: var(--light);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  border: 1px solid #e5e7eb;
}

.podium .medal {
  font-size: 24px;
}

.podium .name {
  font-weight: bold;
  margin-top: 6px;
}

.podium .score {
  color: var(--blue);
  font-size: 22px;
  font-weight: bold;
}

.compare-row {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 10px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

.diff-plus {
  color: #027a48;
  font-weight: bold;
}

.diff-minus {
  color: #b42318;
  font-weight: bold;
}

.small {
  color: gray;
  font-size: 13px;
}

.button-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

@media (min-width: 700px) {
  .button-row {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo-wrap">
    <img src="lyn-logo.png">
  </div>
  <h1>Lyn spillerbørs</h1>
  <p>Stem på spillerne etter kamp. 1–10. Helt subjektivt.</p>
</header>

<main>

<div class="box">
  <label>Velg kamp</label>
  <select id="match">
    <option>TEST</option>

    <option>13.04 Haugesund hjemme</option>
    <option>21.04 Sogndal borte</option>
    <option>27.04 Sandnes Ulf hjemme</option>
    <option>30.04 Moss borte</option>

    <option>01.05 Lyn - Stabæk</option>
    <option>10.05 Raufoss - Lyn</option>
    <option>16.05 Lyn - Kongsvinger</option>
    <option>20.05 Egersund - Lyn</option>
    <option>25.05 Lyn - Strømmen</option>
    <option>31.05 Odd - Lyn</option>
    <option>14.06 Lyn - Bryne</option>
    <option>19.06 Ranheim - Lyn</option>
    <option>27.06 Lyn - Hødd</option>
    <option>02.07 Lyn - Åsane</option>
    <option>26.07 Strømsgodset - Lyn</option>
    <option>02.08 Lyn - Sogndal</option>
    <option>09.08 Stabæk - Lyn</option>
    <option>16.08 Lyn - Odd</option>
    <option>26.08 Åsane - Lyn</option>
    <option>30.08 Kongsvinger - Lyn</option>
    <option>06.09 Lyn - Egersund</option>
    <option>13.09 Hødd - Lyn</option>
    <option>20.09 Lyn - Ranheim</option>
    <option>04.10 Bryne - Lyn</option>
    <option>11.10 Lyn - Strømsgodset</option>
    <option>14.10 Haugesund - Lyn</option>
    <option>18.10 Lyn - Moss</option>
    <option>25.10 Sandnes Ulf - Lyn</option>
    <option>01.11 Lyn - Raufoss</option>
    <option>08.11 Strømmen - Lyn</option>
  </select>
</div>

<div class="box">
  <label>Navn / forumbruker</label>
  <input id="voter" placeholder="Skriv superben for dine egne børser">
  <div class="small">Skriv <b>superben</b> for dine egne stemmer. Da fungerer “superben vs resten”.</div>
</div>

<div class="box">
  <h2>Gi karakter</h2>
  <p>La felt stå tomt hvis spilleren ikke skal vurderes.</p>
  <div class="grid" id="players"></div>
</div>

<div class="box">
  <label>Kommentar</label>
  <br><br>
  <button onclick="sendVote()">Send inn børs</button>
</div>

<div class="box">
  <h2>Resultater</h2>
  <p>Velg kamp over og trykk for å se snitt.</p>
  <div class="button-row">
    <button onclick="loadResults()">Vis snitt for valgt kamp</button>
    <button onclick="loadSuperbenVsRest()">Vis superben vs resten</button>
  </div>
  <div id="results" style="margin-top:16px;"></div>
</div>

</main>

<script>
const SUPABASE_URL = "https://oqwlbdnthdbomnobxqot.supabase.co";
const SUPABASE_KEY = "sb_publishable_7rvKgvaG_Op8qN0R9CWdAA_RATzpP4z";
const MY_NAME = "superben";

const players = [
  { name: "Alexander Pedersen", short: "Pedersen" },
  { name: "Sander Amble Haugen", short: "SAH" },
  { name: "William Sell", short: "Sell" },
  { name: "Ådne Midtskogen", short: "Midtskogen" },
  { name: "Herman Solberg Nilsen", short: "HSN" },
  { name: "Isaac Barnett", short: "Barnett" },
  { name: "Didrik Fredriksen", short: "Fredriksen" },
  { name: "Eron Isufi", short: "Isufi" },
  { name: "Julius Skaug", short: "Skaug" },
  { name: "Anders Bjørntvedt Olsen", short: "ABO" },
  { name: "Ibrahim Sawaneh", short: "Sawaneh" },
  { name: "Andreas Hellum", short: "Hellum" },
  { name: "Matias Johansen", short: "MJ" },
  { name: "William Kurtovic", short: "Kurtovic" },
  { name: "Fallou Sock", short: "Sock" },
  { name: "Isak Vik", short: "Vik" },
  { name: "Isaac Monglo", short: "Monglo" },
  { name: "William Wæhler", short: "Wæhler" },
  { name: "Magnus Aadland", short: "Aadland" }
];

const playersDiv = document.getElementById("players");

players.forEach(p => {
  playersDiv.innerHTML += `
    <div class="player">
      <div class="avatar">
        <img src="bilder/${p.short}.jpg" onerror="this.style.display='none'">
        ${p.short.substring(0,2)}
      </div>
      <div class="player-short">${p.short}</div>
      <div class="player-name">${p.name}</div>
      <input type="number" id="${p.short}" min="1" max="10" placeholder="-">
    </div>
  `;
});

async function sendVote() {
  const match = document.getElementById("match").value;
  const voter = document.getElementById("voter").value.trim() || "Anonym";

  let rows = [];

  players.forEach(p => {
    const val = document.getElementById(p.short).value;

    if (val) {
      rows.push({
        match: match,
        voter_name: voter,
        player: p.short,
        rating: Number(val),
        comment: comment
      });
    }
  });

  if (rows.length === 0) {
    alert("Du må gi minst én karakter først.");
    return;
  }

  const response = await fetch(SUPABASE_URL + "/rest/v1/votes", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": "return=minimal"
    },
    body: JSON.stringify(rows)
  });

  if (!response.ok) {
    alert("Noe gikk feil. Stemmen ble ikke sendt.");
    return;
  }

  alert("Stemmen er sendt!");

  players.forEach(p => {
    document.getElementById(p.short).value = "";
  });

  document.getElementById("comment").value = "";

  loadResults();
}

async function getVotesForSelectedMatch() {
  const match = document.getElementById("match").value;

  const response = await fetch(
    SUPABASE_URL + "/rest/v1/votes?match=eq." + encodeURIComponent(match),
    {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    }
  );

  return await response.json();
}

function buildStats(data) {
  let stats = {};

  data.forEach(v => {
    if (!stats[v.player]) {
      stats[v.player] = { total: 0, count: 0 };
    }

    stats[v.player].total += Number(v.rating);
    stats[v.player].count += 1;
  });

  return Object.keys(stats).map(player => {
    const avg = stats[player].total / stats[player].count;
    return {
      player,
      avg,
      count: stats[player].count
    };
  }).sort((a, b) => b.avg - a.avg);
}

async function loadResults() {
  const data = await getVotesForSelectedMatch();

  if (!data || data.length === 0) {
    document.getElementById("results").innerHTML = "<p>Ingen stemmer på denne kampen enda.</p>";
    return;
  }

  const resultList = buildStats(data);
  const best = resultList[0];
  const topThree = resultList.slice(0, 3);
  const medals = ["🥇", "🥈", "🥉"];

  let html = `
    <div class="bb">
      🔥 Banens beste: ${best.player} med ${best.avg.toFixed(2)}
    </div>

    <div class="top-three">
  `;

  topThree.forEach((r, index) => {
    html += `
      <div class="podium">
        <div class="medal">${medals[index]}</div>
        <div class="name">${r.player}</div>
        <div class="score">${r.avg.toFixed(2)}</div>
        <div class="small">${r.count} stemmer</div>
      </div>
    `;
  });

  html += `</div>`;

  resultList.forEach(r => {
    html += `
      <div class="result-row">
        <div>
          <strong>${r.player}</strong><br>
          <span class="small">${r.count} stemmer</span>
        </div>
        <div class="result-score">${r.avg.toFixed(2)}</div>
      </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
}

async function loadSuperbenVsRest() {
  const data = await getVotesForSelectedMatch();

  if (!data || data.length === 0) {
    document.getElementById("results").innerHTML = "<p>Ingen stemmer på denne kampen enda.</p>";
    return;
  }

  let mine = {};
  let rest = {};

  data.forEach(v => {
    const voter = (v.voter_name || "").toLowerCase().trim();
    const target = voter === MY_NAME ? mine : rest;

    if (!target[v.player]) {
      target[v.player] = { total: 0, count: 0 };
    }

    target[v.player].total += Number(v.rating);
    target[v.player].count += 1;
  });

  let rows = players.map(p => {
    const myData = mine[p.short];
    const restData = rest[p.short];

    const myAvg = myData ? myData.total / myData.count : null;
    const restAvg = restData ? restData.total / restData.count : null;
    const diff = myAvg !== null && restAvg !== null ? myAvg - restAvg : null;

    return {
      player: p.short,
      myAvg,
      restAvg,
      diff
    };
  }).filter(r => r.myAvg !== null || r.restAvg !== null);

  rows.sort((a, b) => {
    if (a.diff === null) return 1;
    if (b.diff === null) return -1;
    return Math.abs(b.diff) - Math.abs(a.diff);
  });

  let html = `
    <div class="bb">
      🧠 superben vs resten
    </div>
    <p class="small">Positive tall betyr at superben er snillere enn resten. Negative tall betyr strengere.</p>
  `;

  rows.forEach(r => {
    const diffText = r.diff === null ? "–" : (r.diff > 0 ? "+" : "") + r.diff.toFixed(2);
    const diffClass = r.diff === null ? "" : (r.diff >= 0 ? "diff-plus" : "diff-minus");

    html += `
      <div class="compare-row">
        <div><strong>${r.player}</strong></div>
        <div>superben: ${r.myAvg === null ? "–" : r.myAvg.toFixed(2)}</div>
        <div>resten: ${r.restAvg === null ? "–" : r.restAvg.toFixed(2)}</div>
        <div class="${diffClass}">${diffText}</div>
      </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
