<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lyn spillerbørs</title>

<style>
:root {
  --red: #d71920;
  --blue: #13294b;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("bakgrunn.jpg.webp") center/cover no-repeat fixed;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

header {
  text-align: center;
  padding: 40px 20px;
  color: white;
}

.logo-wrap {
  width: 120px;
  height: 120px;
  margin: 0 auto 15px;
  background: white;
  border-radius: 25px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-wrap img {
  width: 90px;
  height: 90px;
  object-fit: contain;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

.box {
  background: rgba(255,255,255,0.95);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 18px;
  border-left: 6px solid var(--red);
}

select, input, textarea {
  width: 100%;
  padding: 11px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-top: 6px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}

.player {
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
}

.avatar {
  width: 60px;
  height: 60px;
  background: var(--blue);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-weight: bold;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.player-short {
  font-weight: bold;
  margin-top: 6px;
}

.player-name {
  font-size: 12px;
  color: gray;
}

button {
  background: var(--red);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 12px;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #b51218;
}

.result-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

.bb {
  background: #fff1f2;
  border: 1px solid #fecdd3;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <div class="logo-wrap">
    <img src="lyn-logo.png">
  </div>
  <h1>Lyn spillerbørs</h1>
</header>

<main>

<div class="box">
<label>Velg kamp</label>

<select id="match">

<option>TEST</option>

<option>13.04 Haugesund hjemme</option>
<option>21.04 Sogndal borte</option>
<option>27.04 Sandnes Ulf hjemme</option>
<option>30.04 Moss borte</option>

<option>01.05 Lyn - Stabæk</option>
<option>10.05 Raufoss - Lyn</option>
<option>16.05 Lyn - Kongsvinger</option>
<option>20.05 Egersund - Lyn</option>
<option>25.05 Lyn - Strømmen</option>
<option>31.05 Odd - Lyn</option>
<option>14.06 Lyn - Bryne</option>
<option>19.06 Ranheim - Lyn</option>
<option>27.06 Lyn - Hødd</option>
<option>02.07 Lyn - Åsane</option>
<option>26.07 Strømsgodset - Lyn</option>
<option>02.08 Lyn - Sogndal</option>
<option>09.08 Stabæk - Lyn</option>
<option>16.08 Lyn - Odd</option>
<option>26.08 Åsane - Lyn</option>
<option>30.08 Kongsvinger - Lyn</option>
<option>06.09 Lyn - Egersund</option>
<option>13.09 Hødd - Lyn</option>
<option>20.09 Lyn - Ranheim</option>
<option>04.10 Bryne - Lyn</option>
<option>11.10 Lyn - Strømsgodset</option>
<option>14.10 Haugesund - Lyn</option>
<option>18.10 Lyn - Moss</option>
<option>25.10 Sandnes Ulf - Lyn</option>
<option>01.11 Lyn - Raufoss</option>
<option>08.11 Strømmen - Lyn</option>

</select>
</div>

<div class="box">
<label>Navn</label>
<input id="voter">
</div>

<div class="box">
<h2>Spillere</h2>
<div class="grid" id="players"></div>
</div>

<div class="box">
<textarea id="comment" placeholder="Kommentar"></textarea>
<button onclick="sendVote()">Send inn</button>
</div>

<div class="box">
<h2>Resultater</h2>
<button onclick="loadResults()">Vis snitt</button>
<div id="results"></div>
</div>

</main>

<script>
const SUPABASE_URL = "https://oqwlbdnthdbomnobxqot.supabase.co";
const SUPABASE_KEY = "sb_publishable_7rvKgvaG_Op8qN0R9CWdAA_RATzpP4z";

const players = [
  { name: "Alexander Pedersen", short: "Pedersen" },
  { name: "Sander Amble Haugen", short: "SAH" },
  { name: "William Sell", short: "Sell" },
  { name: "Ådne Midtskogen", short: "Midtskogen" },
  { name: "Herman Solberg Nilsen", short: "HSN" },
  { name: "Didrik Fredriksen", short: "Fredriksen" },
  { name: "Eron Isufi", short: "Isufi" },
  { name: "Julius Skaug", short: "Skaug" },
  { name: "Anders Bjørntvedt Olsen", short: "ABO" },
  { name: "Ibrahim Sawaneh", short: "Sawaneh" },
  { name: "Andreas Hellum", short: "Hellum" },
  { name: "Matias Johansen", short: "MJ" },
  { name: "William Kurtovic", short: "Kurtovic" },
  { name: "Fallou Sock", short: "Sock" },
  { name: "Isaac Barnett", short: "Barnett" },
  { name: "Isak Vik", short: "Vik" },
  { name: "Isaac Monglo", short: "Monglo" },
  { name: "William Wæhler", short: "Wæhler" },
  { name: "Magnus Aadland", short: "Aadland" }
];

const playersDiv = document.getElementById("players");

players.forEach(p => {
  playersDiv.innerHTML += `
    <div class="player">
      <div class="avatar">
        <img src="bilder/${p.short}.jpg" onerror="this.style.display='none'">
        ${p.short.substring(0,2)}
      </div>
      <div class="player-short">${p.short}</div>
      <div class="player-name">${p.name}</div>
      <input type="number" id="${p.short}" min="1" max="10">
    </div>
  `;
});

async function sendVote() {
  const match = document.getElementById("match").value;
  const voter = document.getElementById("voter").value || "Anonym";
  const comment = document.getElementById("comment").value;

  let rows = [];

  players.forEach(p => {
    let val = document.getElementById(p.short).value;
    if(val) {
      rows.push({
        match,
        voter_name: voter,
        player: p.short,
        rating: Number(val),
        comment
      });
    }
  });

  await fetch(SUPABASE_URL + "/rest/v1/votes", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(rows)
  });

  alert("Sendt!");
}

async function loadResults() {
  const match = document.getElementById("match").value;

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/votes?match=eq." + encodeURIComponent(match),
    {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  let stats = {};

  data.forEach(v => {
    if (!stats[v.player]) stats[v.player] = { total: 0, count: 0 };
    stats[v.player].total += v.rating;
    stats[v.player].count++;
  });

  let list = Object.keys(stats).map(p => ({
    player: p,
    avg: stats[p].total / stats[p].count,
    count: stats[p].count
  }));

  list.sort((a,b)=>b.avg-a.avg);

  let html = `<div class="bb">🔥 BB: ${list[0].player} (${list[0].avg.toFixed(2)})</div>`;

  list.forEach(r=>{
    html += `<div class="result-row">
      <div>${r.player} (${r.count})</div>
      <div>${r.avg.toFixed(2)}</div>
    </div>`;
  });

  document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
