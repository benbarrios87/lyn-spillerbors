<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Lyn spillerbørs</title>

<style>
:root {
  --red: #d71920;
  --blue: #13294b;
  --white: #ffffff;
}

/* bakgrunn */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("bakgrunn.jpg.webp") center/cover no-repeat fixed;
}

/* mørk overlay */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
  z-index: -1;
}

/* header */
header {
  text-align: center;
  padding: 40px 20px;
  color: white;
}

/* logo */
.logo-wrap {
  width: 120px;
  height: 120px;
  margin: 0 auto 15px;
  background: white;
  border-radius: 25px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-wrap img {
  width: 90px;
  height: 90px;
  object-fit: contain;
}

/* tittel */
h1 {
  margin: 10px 0;
  font-size: 38px;
}

header p {
  opacity: 0.9;
}

/* layout */
main {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

/* kort */
.box {
  background: rgba(255,255,255,0.95);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 18px;
  border-left: 6px solid var(--red);
}

/* inputs */
select, input, textarea {
  width: 100%;
  padding: 11px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-top: 6px;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}

/* spillerkort */
.player {
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  border: 1px solid #eee;
}

/* avatar */
.avatar {
  width: 55px;
  height: 55px;
  background: var(--blue);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-weight: bold;
}

/* knapp */
button {
  background: var(--red);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 12px;
  width: 100%;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #b51218;
}

/* seksjon tittel */
h2 {
  margin-top: 0;
}
</style>
</head>

<body>

<header>
  <div class="logo-wrap">
    <img src="lyn-logo.png">
  </div>
  <h1>Lyn spillerbørs</h1>
  <p>Stem på spillerne etter kamp. 1–10. Helt subjektivt.</p>
</header>

<main>

<div class="box">
<label>Velg kamp</label>
<select id="match">
<option>Moss borte</option>
<option>Sandnes Ulf hjemme</option>
<option>Sogndal borte</option>
<option>Haugesund hjemme</option>
</select>
</div>

<div class="box">
<label>Navn (valgfritt)</label>
<input id="voter">
</div>

<div class="box">
<h2>Gi karakter</h2>
<div class="grid" id="players"></div>
</div>

<div class="box">
<label>Kommentar</label>
<textarea id="comment"></textarea>
<button onclick="sendVote()">Send inn børs</button>
</div>

</main>

<script>
const SUPABASE_URL = "https://oqwlbdnthdbomnobxqot.supabase.co";
const SUPABASE_KEY = "sb_publishable_7rvKgvaG_Op8qN0R9CWdAA_RATzpP4z";

const players = [
"Pedersen","SAH","Sell","Midtskogen","HSN",
"Fredriksen","Isufi","Skaug","ABO",
"Sawaneh","Hellum","Kurtovic","Sock",
"Vik","Monglo","Wæhler","Aadland","Hartmann"
];

const playersDiv = document.getElementById("players");

players.forEach(p => {
  playersDiv.innerHTML += `
  <div class="player">
    <div class="avatar">${p.substring(0,2)}</div>
    <div>${p}</div>
    <input type="number" id="${p}" min="1" max="10">
  </div>
  `;
});

async function sendVote() {
  const match = document.getElementById("match").value;
  const voter = document.getElementById("voter").value || "anon";
  const comment = document.getElementById("comment").value;

  let rows = [];

  players.forEach(p => {
    let val = document.getElementById(p).value;
    if(val) {
      rows.push({
        match,
        voter_name: voter,
        player: p,
        rating: Number(val),
        comment
      });
    }
  });

  await fetch(SUPABASE_URL + "/rest/v1/votes", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(rows)
  });

  alert("Sendt!");
}
</script>

</body>
</html>
