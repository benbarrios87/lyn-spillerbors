  color:var(--muted);

    grid-template-columns:repeat(4,1fr);

.row:last-child{

}

.result-row{

  align-items:center;

}

.score{

  padding:5px 10px;

.badge.red{

.badge.green{

  border-color:rgba(34,197,94,0.65);

.table-wrap{

table{

th,td{

th{

  font-size:13px;

td:last-child,
th:last-child{

.profile-link{

.player-link{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.player-link:hover{
  color:var(--gold);
  text-decoration:underline;
}
</style>

<script>

const AWAY_FANS_PLAYER = "Bortefeltet";
const TIP_HOME_PLAYER = "TIP_HOME_GOALS";
const TIP_AWAY_PLAYER = "TIP_AWAY_GOALS";

const players = [
  { name:"Alexander Pedersen", short:"Pedersen", position:"KEEPER" },
  { name:"Sander Amble Haugen", short:"SAH", position:"FORS" },
  { name:"William Sell", short:"Sell", position:"FORS" },

];

const params = new URLSearchParams(window.location.search);
const profileUser = cleanVoterName(params.get("user") || "");

document.getElementById("username").textContent = profileUser || "Ukjent bruker";

function cleanVoterName(name){
  return (name || "").trim().toLowerCase();
}

function getMatchData(matchId){
  return matchesData.find(m => m.id === matchId) || null;
}

function formatDate(dateString){
  if (!dateString) return "";
  const d = new Date(dateString + "T12:00:00");
  return d.toLocaleDateString("no-NO", { day:"2-digit", month:"2-digit" });
}

function decodeGoals(value){
  return Number(value) - 1;
}

function getOutcome(home, away){
  if (home > away) return "H";
  if (home < away) return "B";
  return "U";
}

function scorePrediction(tipHome, tipAway, actualHome, actualAway){
  const exact = tipHome === actualHome && tipAway === actualAway;
  const sameOutcome = getOutcome(tipHome, tipAway) === getOutcome(actualHome, actualAway);
  const sameGoalDiff = (tipHome - tipAway) === (actualHome - actualAway);

  if (exact) return 3;
  if (sameOutcome && sameGoalDiff) return 2;
  if (sameOutcome) return 1;
  return 0;
}

function fantasyPosition(playerName){
  const p = players.find(x => x.short === playerName || x.name === playerName);
  return p ? p.position : "";
}
function normalizePlayerName(name){
  return String(name || "").trim().toLowerCase();
}

function getPlayerStat(statsMap, playerName){
  if (!statsMap || !playerName) return null;
  if (statsMap[playerName]) return statsMap[playerName];

  const wanted = normalizePlayerName(playerName);
  const foundKey = Object.keys(statsMap).find(key => normalizePlayerName(key) === wanted);
  if (foundKey) return statsMap[foundKey];

  const p = players.find(x =>
    normalizePlayerName(x.short) === wanted ||
    normalizePlayerName(x.name) === wanted
  );

  if (!p) return null;

  return (
    statsMap[p.short] ||
    statsMap[p.name] ||
    statsMap[normalizePlayerName(p.short)] ||
    statsMap[normalizePlayerName(p.name)] ||
    null
  );
}

function playerLink(playerName){
  return `
    <a href="spiller.html?player=${encodeURIComponent(playerName)}" class="player-link">
      ${playerName}
    </a>
  `;
}
function calculateFantasyPoints(player, isCaptain, statsMap){
  const stat = getPlayerStat(statsMap, player);
  const position = fantasyPosition(player);
  if (!stat) return 0;

  let points = 0;

  if (stat.goals > 0) {
    if (position === "ANG") points += stat.goals * 4;
    if (position === "MID") points += stat.goals * 5;
    if (position === "FORS") points += stat.goals * 6;
    if (position === "KEEPER") points += stat.goals * 10;
  }

  points += (stat.assists || 0) * 3;

  if (stat.clean_sheet) {
    if (position === "MID") points += 1;
    if (position === "FORS") points += 4;
    if (position === "KEEPER") points += 5;
  }

  if (stat.penalty_save && position === "KEEPER") points += 5;
  if (stat.red_card) points -= 3;
  if (stat.rating >= 7.5) points += 1;
  if (stat.rating > 0 && stat.rating <= 4.5) points -= 1;
  if (isCaptain) points = Math.round(points * 1.5);

  return points;
}

function isPredictionVote(v){
  return v.match_id && v.match_id !== "TEST" && (v.player === TIP_HOME_PLAYER || v.player === TIP_AWAY_PLAYER);
}

function isPlayerVote(v){
  return v.match_id && v.match_id !== "TEST" && v.player !== AWAY_FANS_PLAYER && !isPredictionVote(v);
}

function buildPredictions(votes){
  const map = {};

  votes.filter(isPredictionVote).forEach(v => {
    const voter = cleanVoterName(v.voter);
    const key = `${v.match_id}|||${voter}`;

    if (!map[key]) {
      map[key] = {
        match_id:v.match_id,
        voter,
        home:null,
        away:null
      };
    }

    if (v.player === TIP_HOME_PLAYER) map[key].home = decodeGoals(v.rating);
    if (v.player === TIP_AWAY_PLAYER) map[key].away = decodeGoals(v.rating);
  });

  return Object.values(map).filter(p => p.home !== null && p.away !== null);
}

function buildRatingMaps(allVotes){
  const ratingMaps = {};

  allVotes.filter(isPlayerVote).forEach(v => {
    if (!ratingMaps[v.match_id]) ratingMaps[v.match_id] = {};
    if (!ratingMaps[v.match_id][v.player]) ratingMaps[v.match_id][v.player] = { total:0, count:0 };

    ratingMaps[v.match_id][v.player].total += Number(v.rating);
    ratingMaps[v.match_id][v.player].count += 1;
  });

  return ratingMaps;
}

function buildStatsByMatch(stats, allVotes){
  const ratingMaps = buildRatingMaps(allVotes);
  const statsByMatch = {};

  (stats || []).forEach(row => {
    if (!statsByMatch[row.match_id]) statsByMatch[row.match_id] = {};

    const ratingData = ratingMaps[row.match_id] && ratingMaps[row.match_id][row.player];
    const rating = ratingData ? ratingData.total / ratingData.count : 0;

    statsByMatch[row.match_id][row.player] = {
      ...row,
      rating
    };
  });

  return statsByMatch;
}

function countMapToRows(map, suffix = ""){
  return Object.entries(map)
    .sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]))
    .map(([name,count]) => ({
      name,
      count,
      suffix
    }));
}

function managerType(data){
  if (data.perfectTips >= 2) return "🔮 Orakel";
  if (data.bestFantasy >= 20) return "🔥 Fantasy-monster";
  if (data.favoritePlayerCount >= 4) return `❤️ ${data.favoritePlayer}-lojalist`;
  if (data.captainCount >= 4) return "⭐ Kapteinsspesialist";
  if (data.tipsCount > data.fantasyCount) return "🎯 Tippegeneral";
  if (data.fantasyCount > data.tipsCount) return "⚽ Fantasygrinder";
  return "🧠 Allrounder";
}

function renderRows(rows, emptyText = "Ingen data enda.", makePlayersClickable = false){
  if (!rows || rows.length === 0) return `<div class="small">${emptyText}</div>`;

  return rows.map(row => `
    <div class="result-row">
      <div>
        <strong>${makePlayersClickable ? playerLink(row.name) : row.name}</strong><br>
        <span class="small">${row.sub || ""}</span>
      </div>
      <div class="score">${row.count}${row.suffix || ""}</div>
    </div>
  `).join("");
}


function latestMatchActivity(userPicks, userVotes, userPredictions){
  const activities = [];

  userPicks.forEach(pick => {
    const match = getMatchData(pick.match_id);
    if (!match) return;

    activities.push({
      date:match.date,
      html:`Leverte fantasy mot ${match.home} - ${match.away}: ${playerLink(pick.player1)}, ${playerLink(pick.player2)}, ⭐ ${playerLink(pick.captain)}`
    });
  });

  userPredictions.forEach(tip => {
    const match = getMatchData(tip.match_id);
    if (!match) return;

    activities.push({
      date:match.date,
      html:`Leverte tippetips mot ${match.home} - ${match.away}: ${tip.home}-${tip.away}`
    });
  });

  const votesByMatch = {};

  userVotes.filter(isPlayerVote).forEach(v => {
    if (!votesByMatch[v.match_id]) votesByMatch[v.match_id] = [];
    votesByMatch[v.match_id].push(v);
  });

  Object.keys(votesByMatch).forEach(matchId => {
    const match = getMatchData(matchId);
    if (!match) return;

    const sortedVotes = votesByMatch[matchId]
      .slice()
      .sort((a,b) => String(a.player).localeCompare(String(b.player), "no"));

    const shortVotes = sortedVotes
      .map(v => `${playerLink(v.player)} ${v.rating}`)
      .join(", ");

    activities.push({
      date:match.date,
      html:`Leverte børs mot ${match.home} - ${match.away}: ${shortVotes}`
    });
  });

  return activities
    .sort((a,b) => new Date(b.date) - new Date(a.date))
    .slice(0, 5);
}

async function loadProfile(){
  if (!profileUser) {
    document.getElementById("content").innerHTML = `<div class="warning">Ingen bruker valgt.</div>`;
    return;
  }

  const [{ data:picks }, { data:stats }, { data:votes }] = await Promise.all([
    supabaseClient.from("fantasy_picks").select("*"),
    supabaseClient.from("fantasy_stats").select("*"),
    supabaseClient.from("votes").select("*")
  ]);

  const allPicks = picks || [];
  const allStats = stats || [];
  const allVotes = votes || [];

  const statsByMatch = buildStatsByMatch(allStats, allVotes);
  const predictions = buildPredictions(allVotes);

  const userPicks = allPicks.filter(p => cleanVoterName(p.voter) === profileUser);
  const userPredictions = predictions.filter(p => p.voter === profileUser);
  const userVotes = allVotes.filter(v => cleanVoterName(v.voter) === profileUser);

  const latestActivities = latestMatchActivity(
    userPicks,
    userVotes,
    userPredictions
  );

  const fantasyHistory = [];
  const captainMap = {};
  const chosenPlayerMap = {};
  const playerVoteMap = {};

  userPicks.forEach(pick => {
    const statsMap = statsByMatch[pick.match_id] || {};

    const p1 = calculateFantasyPoints(pick.player1, false, statsMap);
    const p2 = calculateFantasyPoints(pick.player2, false, statsMap);
    const cap = calculateFantasyPoints(pick.captain, true, statsMap);
    const total = p1 + p2 + cap;

    const match = getMatchData(pick.match_id);

    fantasyHistory.push({
      match_id:pick.match_id,
      label:match ? `${formatDate(match.date)} ${match.home} - ${match.away}` : pick.match_id,
      total,
      team:`${playerLink(pick.player1)}, ${playerLink(pick.player2)}, ⭐ ${playerLink(pick.captain)}`
    });

    [pick.player1, pick.player2, pick.captain].forEach(player => {
      chosenPlayerMap[player] = (chosenPlayerMap[player] || 0) + 1;
    });

    captainMap[pick.captain] = (captainMap[pick.captain] || 0) + 1;
  });

  userVotes.forEach(v => {
    if (
      v.player === TIP_HOME_PLAYER ||
      v.player === TIP_AWAY_PLAYER ||
      v.player === AWAY_FANS_PLAYER
    ) return;

    playerVoteMap[v.player] = (playerVoteMap[v.player] || 0) + 1;
  });

  const tipHistory = [];

  userPredictions.forEach(p => {
    const match = getMatchData(p.match_id);
    if (!match || !match.actual) return;

    const points = scorePrediction(p.home, p.away, match.actual.home, match.actual.away);

    tipHistory.push({
      match_id:p.match_id,
      label:`${formatDate(match.date)} ${match.home} - ${match.away}`,
      tip:`${p.home}-${p.away}`,
      actual:`${match.actual.home}-${match.actual.away}`,
      points
    });
  });

  const totalFantasyRaw = fantasyHistory.reduce((sum,r) => sum + r.total, 0);
  const totalTipPoints = tipHistory.reduce((sum,r) => sum + r.points, 0);
  const bestFantasy = fantasyHistory.length ? [...fantasyHistory].sort((a,b) => b.total - a.total)[0] : null;
  const worstFantasy = fantasyHistory.length ? [...fantasyHistory].sort((a,b) => a.total - b.total)[0] : null;
  const bestTip = tipHistory.filter(r => r.points === 3).length;
  const diffTips = tipHistory.filter(r => r.points === 2).length;
  const outcomeTips = tipHistory.filter(r => r.points === 1).length;
  const zeroTips = tipHistory.filter(r => r.points === 0).length;

  const favoritePlayers = countMapToRows(playerVoteMap, " stemmer");
  const favoriteChosen = countMapToRows(chosenPlayerMap, " valg");
  const captains = countMapToRows(captainMap, "x");

  const favoritePlayer = favoriteChosen[0]?.name || "-";
  const favoritePlayerCount = favoriteChosen[0]?.count || 0;
  const captainCount = captains[0]?.count || 0;

  const formFantasy = fantasyHistory.slice(-5);
  const formPoints = formFantasy.reduce((sum,r) => sum + r.total, 0);

  const profileData = {
    perfectTips:bestTip,
    bestFantasy:bestFantasy ? bestFantasy.total : 0,
    favoritePlayer,
    favoritePlayerCount,
    captainCount,
    tipsCount:userPredictions.length,
    fantasyCount:userPicks.length
  };

  const type = managerType(profileData);

  document.getElementById("profileSubtitle").textContent = type;

  const badges = [];
  if (bestTip > 0) badges.push(`<span class="badge gold">🔮 Orakel x${bestTip}</span>`);
  if (captainCount >= 3) badges.push(`<span class="badge gold">⭐ Kapteinsspesialist</span>`);
  if (favoritePlayerCount >= 3) badges.push(`<span class="badge green">❤️ Lojal mot ${favoritePlayer}</span>`);
  if (bestFantasy && bestFantasy.total >= 15) badges.push(`<span class="badge red">🔥 Høy fantasyrunde</span>`);
  if (userPicks.length + userPredictions.length >= 8) badges.push(`<span class="badge">🏅 Aktiv bruker</span>`);

  document.getElementById("profileBadges").innerHTML = badges.join("");

  document.getElementById("content").innerHTML = `
    <div class="grid four">
      <div class="card">
        <h3>🏆 Lynprofil</h3>
        <div class="big">${totalFantasyRaw + totalTipPoints}</div>
        <div class="small">råpoeng fantasy + tippetips</div>
      </div>

      <div class="card">
        <h3>⚽ Fantasy</h3>
        <div class="big">${totalFantasyRaw}</div>
        <div class="small">${userPicks.length} lag levert</div>
      </div>

      <div class="card">
        <h3>🎯 Tippetips</h3>
        <div class="big">${totalTipPoints}</div>
        <div class="small">${userPredictions.length} kuponger levert</div>
      </div>

      <div class="card">
        <h3>🔥 Form siste 5</h3>
        <div class="big">${formPoints}</div>
        <div class="small">fantasypoeng</div>
      </div>
    </div>


    <div class="card" style="margin-top:16px;">
      <h2>🕵️ Siste aktivitet</h2>
      ${
        latestActivities.length
          ? latestActivities.map(a => `
            <div class="row">${a.html}</div>
          `).join("")
          : `<div class="small">Ingen aktivitet ennå.</div>`
      }
    </div>

    <div class="grid" style="margin-top:16px;">
      <div class="card">
        <h2>⭐ Kapteinsvalg</h2>
       ${renderRows(captains, "Ingen kapteinsvalg enda.", true)}
      </div>

      <div class="card">
        <h2>🔥 Mest brukt i fantasy</h2>
        ${renderRows(favoriteChosen, "Ingen fantasyvalg enda.", true)}
      </div>
    </div>

    <div class="grid" style="margin-top:16px;">
      <div class="card">
        <h2>🎯 Tippesnacks</h2>

        <div class="result-row">
          <div><strong>Helt riktige</strong><br><span class="small">Orakel-treff</span></div>
          <div class="score">${bestTip}</div>
        </div>

        <div class="result-row">
          <div><strong>Riktig målforskjell</strong><br><span class="small">Riktig utfall + diff</span></div>
          <div class="score">${diffTips}</div>
        </div>

        <div class="result-row">
          <div><strong>Riktig utfall</strong><br><span class="small">Riktig vinner/uavgjort</span></div>
          <div class="score">${outcomeTips}</div>
        </div>

        <div class="result-row">
          <div><strong>Bom</strong><br><span class="small">Vi nevner det diskret</span></div>
          <div class="score">${zeroTips}</div>
        </div>
      </div>

      <div class="card">
        <h2>📈 Fantasyrekorder</h2>

        <div class="result-row">
          <div><strong>Beste runde</strong><br><span class="small">${bestFantasy ? bestFantasy.label : "Ingen"}</span></div>
          <div class="score">${bestFantasy ? bestFantasy.total : "–"}</div>
        </div>

        <div class="result-row">
          <div><strong>Verste runde</strong><br><span class="small">${worstFantasy ? worstFantasy.label : "Ingen"}</span></div>
          <div class="score">${worstFantasy ? worstFantasy.total : "–"}</div>
        </div>

        <div class="result-row">
          <div><strong>Snitt fantasy</strong><br><span class="small">Per leverte lag</span></div>
          <div class="score">${userPicks.length ? (totalFantasyRaw / userPicks.length).toFixed(1) : "–"}</div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h2>📊 Fantasyhistorikk</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Kamp</th>
              <th>Lag</th>
              <th>Poeng</th>
            </tr>
          </thead>
          <tbody>
            ${fantasyHistory.slice().reverse().map(r => `
              <tr>
                <td>${r.label}</td>
                <td>${r.team}</td>
                <td>${r.total}</td>
              </tr>
            `).join("") || `<tr><td colspan="3">Ingen fantasyhistorikk.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h2>🎯 Tippehistorikk</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Kamp</th>
              <th>Tips</th>
              <th>Fasit</th>
              <th>Poeng</th>
            </tr>
          </thead>
          <tbody>
            ${tipHistory.slice().reverse().map(r => `
              <tr>
                <td>${r.label}</td>
                <td>${r.tip}</td>
                <td>${r.actual}</td>
                <td>${r.points}</td>
              </tr>
            `).join("") || `<tr><td colspan="4">Ingen tippehistorikk.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

loadProfile();
