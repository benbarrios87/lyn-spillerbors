<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyn Games</title>
  <link rel="icon" href="lblogoen.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --red:#d71920;
      --blue:#13294b;
      --gold:#ffd166;
      --dark:#07111f;
      --panel:rgba(5,8,20,.78);
      --line:rgba(255,255,255,.16);
      --muted:rgba(255,255,255,.72);
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      min-height:100vh;
      font-family:Arial, sans-serif;
      color:white;
      background:
        radial-gradient(circle at 12% 8%, rgba(255,209,102,.32), transparent 27%),
        radial-gradient(circle at 85% 18%, rgba(11,99,229,.30), transparent 30%),
        radial-gradient(circle at 50% 92%, rgba(215,25,32,.25), transparent 34%),
        linear-gradient(135deg, #06111f, #102a43 55%, #090d18);
    }

    .wrap {
      width:100%;
      max-width:1120px;
      margin:0 auto;
      padding:26px 14px 70px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:10px;
      color:white;
      text-decoration:none;
      font-weight:900;
    }

    .brand img {
      width:42px;
      height:42px;
      object-fit:contain;
    }

    .toplinks {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .toplinks a {
      color:white;
      text-decoration:none;
      padding:9px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      font-size:14px;
      font-weight:800;
    }

    .hero {
      text-align:center;
      padding:36px 22px;
      border-radius:34px;
      background:
        linear-gradient(135deg, rgba(11,99,229,.92), rgba(215,25,32,.76)),
        radial-gradient(circle at top, rgba(255,255,255,.20), transparent 44%);
      box-shadow:0 24px 60px rgba(0,0,0,.38);
      border:1px solid rgba(255,255,255,.25);
      position:relative;
      overflow:hidden;
    }

    .hero::after {
      content:"GAMES";
      position:absolute;
      right:-24px;
      bottom:-14px;
      font-size:110px;
      font-weight:900;
      color:rgba(255,255,255,.06);
      transform:rotate(-6deg);
      pointer-events:none;
    }

    .kicker {
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:var(--gold);
      color:#101827;
      font-weight:900;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.6px;
    }

    h1 {
      margin:16px 0 10px;
      font-size:58px;
      line-height:1;
    }

    .hero p {
      max-width:680px;
      margin:auto;
      font-size:18px;
      line-height:1.45;
      color:rgba(255,255,255,.92);
    }

    .identity {
      margin:22px auto 0;
      max-width:680px;
      padding:14px;
      border-radius:22px;
      background:rgba(0,0,0,.34);
      border:1px solid rgba(255,255,255,.14);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      text-align:left;
      position:relative;
      z-index:2;
    }

    .identity strong { color:var(--gold); }

    .identity a {
      color:var(--gold);
      font-weight:900;
      text-decoration:none;
    }

    .main-grid {
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
      margin-top:22px;
    }

    @media(min-width:900px) {
      .main-grid {
        grid-template-columns:1.1fr .9fr;
        align-items:start;
      }
    }

    .panel {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      padding:22px;
      box-shadow:0 16px 42px rgba(0,0,0,.32);
      backdrop-filter:blur(8px);
    }

    .panel h2 {
      margin:0 0 12px;
      font-size:26px;
    }

    .today-card {
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at top right, rgba(255,209,102,.28), transparent 35%),
        linear-gradient(135deg, rgba(19,41,75,.98), rgba(215,25,32,.82));
      border-color:rgba(255,209,102,.62);
    }

    .today-card::after {
      content:"⭐";
      position:absolute;
      right:22px;
      top:18px;
      font-size:72px;
      opacity:.16;
    }

    .game-title {
      font-size:38px;
      font-weight:900;
      margin:8px 0 8px;
      line-height:1.05;
    }

    .game-text {
      color:rgba(255,255,255,.86);
      line-height:1.45;
      max-width:620px;
    }

    .play-row {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn {
      display:inline-block;
      border:none;
      border-radius:16px;
      padding:13px 18px;
      background:var(--gold);
      color:#111827;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      box-shadow:0 10px 24px rgba(255,122,26,.18);
    }

    .btn.secondary {
      background:rgba(255,255,255,.10);
      color:white;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:none;
    }

    .btn.locked {
      opacity:.55;
      cursor:not-allowed;
    }

    .score-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:18px;
    }

    .score-box {
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      text-align:center;
    }

    .score-box span {
      display:block;
      color:var(--muted);
      font-size:13px;
      margin-bottom:6px;
    }

    .score-box strong {
      display:block;
      color:var(--gold);
      font-size:28px;
    }

    .leader-hero {
      padding:16px;
      border-radius:22px;
      background:
        radial-gradient(circle at top right, rgba(255,209,102,.25), transparent 35%),
        rgba(255,255,255,.08);
      border:1px solid rgba(255,209,102,.35);
      margin-bottom:12px;
    }

    .leader-hero .label {
      color:var(--gold);
      font-weight:900;
      font-size:13px;
      text-transform:uppercase;
    }

    .leader-hero .name {
      margin-top:6px;
      font-size:30px;
      font-weight:900;
    }

    .leader-hero .score {
      margin-top:4px;
      color:var(--gold);
      font-size:34px;
      font-weight:900;
    }

    .leaderboard {
      display:grid;
      gap:10px;
    }

    .leader-row {
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:12px;
      align-items:center;
      padding:12px;
      border-radius:18px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.11);
    }

    .rank {
      width:34px;
      height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      background:rgba(255,255,255,.10);
      font-weight:900;
    }

    .rank.gold {
      background:var(--gold);
      color:#111827;
    }

    .leader-name { font-weight:900; }

    .leader-sub {
      color:var(--muted);
      font-size:13px;
      margin-top:2px;
    }

    .leader-score {
      color:var(--gold);
      font-weight:900;
      font-size:22px;
    }

    .week-strip {
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;
      margin-top:16px;
    }

    .day {
      padding:12px 6px;
      border-radius:16px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      text-align:center;
      font-size:12px;
      color:var(--muted);
    }

    .day.active {
      background:rgba(255,209,102,.20);
      border-color:rgba(255,209,102,.60);
      color:white;
      font-weight:900;
      box-shadow:0 0 0 2px rgba(255,209,102,.16);
    }

    .day strong {
      display:block;
      font-size:21px;
      margin-bottom:4px;
    }

    .games-grid {
      margin-top:18px;
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    @media(min-width:760px) {
      .games-grid {
        grid-template-columns:1fr 1fr;
      }
    }

    .mini-game {
      position:relative;
      min-height:170px;
      padding:20px;
      border-radius:24px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.12), transparent 34%),
        rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.13);
      overflow:hidden;
    }

    .mini-game.today {
      border-color:rgba(255,209,102,.65);
      background:
        radial-gradient(circle at top right, rgba(255,209,102,.22), transparent 36%),
        rgba(255,255,255,.09);
    }

    .mini-game.locked {
      opacity:.58;
    }

    .mini-icon {
      font-size:34px;
      margin-bottom:10px;
    }

    .mini-title {
      font-size:22px;
      font-weight:900;
      margin-bottom:8px;
    }

    .mini-text {
      color:var(--muted);
      line-height:1.4;
      font-size:14px;
    }

    .mini-status {
      margin-top:14px;
      display:inline-block;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      font-weight:900;
      font-size:12px;
      color:var(--gold);
    }

    .empty {
      color:var(--muted);
      line-height:1.45;
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }

    @media(max-width:650px) {
      .topbar {
        align-items:flex-start;
        flex-direction:column;
      }

      h1 {
        font-size:42px;
      }

      .hero p {
        font-size:16px;
      }

      .identity {
        flex-direction:column;
        align-items:flex-start;
      }

      .score-grid {
        grid-template-columns:1fr;
      }

      .week-strip {
        grid-template-columns:repeat(2,1fr);
      }
    }
  </style>
</head>

<body>

<div class="wrap">

  <header class="topbar">
    <a class="brand" href="v2/index.html">
      <img src="lblogoen.png" alt="">
      <span>Lynbørs</span>
    </a>

    <nav class="toplinks">
      <a href="v2/index.html">Forside</a>
      <a href="v2/lynligaen.html">Lynligaen</a>
      <a href="v2/fantasy.html">Fantasy</a>
    </nav>
  </header>

  <section class="hero">
    <div class="kicker">Lyn Games</div>
    <h1>🎮 Dagens utfordring</h1>
    <p>
      Ett Lyn-spill er dagens offisielle utfordring. Resten ligger på benken og venter på sin tur.
    </p>

    <div id="identityBox" class="identity">
      Laster bruker...
    </div>
  </section>

  <section class="main-grid">
    <div class="panel today-card">
      <div class="kicker">Dagens spill</div>
      <div id="todayGame">Laster dagens spill...</div>
    </div>

    <div class="panel">
      <h2>👑 Leder akkurat nå</h2>
      <div id="leaderHero"></div>

      <h2 style="margin-top:18px;">🏆 Toppliste</h2>
      <div id="leaderboard" class="leaderboard">Laster...</div>
    </div>
  </section>

  <section class="panel" style="margin-top:18px;">
    <h2>📅 Ukesrotasjon</h2>
    <div id="weekStrip" class="week-strip"></div>
  </section>

  <section class="panel" style="margin-top:18px;">
    <h2>🕹️ Alle Lyn Games</h2>
    <div id="gamesGrid" class="games-grid"></div>
  </section>

</div>

<script type="module">
import {
  getGameLeaderboard,
  getGameUser
} from "./v2/js/games-core.js";

const games = [
  {
    id: "career",
    title: "Karrieregåten",
    icon: "🧩",
    href: "career.html",
    text: "Klubbkarrieren avsløres steg for steg. Gjett tidlig for maks poeng."
  },
  {
    id: "dailyxi",
    title: "Daily XI",
    icon: "⚽",
    href: "daily-xi.html",
    text: "Gjett startelleveren fra en klassisk Lyn-kamp. Du har 3 liv."
  },
  {
    id: "herd",
    title: "Herd Mentality",
    icon: "🐑",
    href: "herd.html",
    text: "Svar det du tror flest Lyn-supportere svarer. Åpent til kl. 22."
  },
  {
    id: "hvem",
    title: "Hvem er dette?",
    icon: "📸",
    href: "hvem.html",
    text: "Gjett dagens Lyn-spiller fra bildet. Hint gir færre poeng."
  },
  {
    id: "tenable",
    title: "Lyn Tenable",
    icon: "🔟",
    href: "tenable.html",
    text: "Finn flest mulig riktige svar før livene ryker."
  },
  {
    id: "wordle",
    title: "Lyn Wordle",
    icon: "🔤",
    href: "wordle.html",
    text: "Gjett etternavnet til dagens tidligere Lyn-spiller."
  },
  {
    id: "rebel",
    title: "Rebel Mentality",
    icon: "🦊",
    href: "rebel.html",
    text: "Svar det du tror færrest Lyn-supportere svarer. Åpent til kl. 22."
  }
];

const weeklySchedule = {
  0: "rebel",
  1: "career",
  2: "dailyxi",
  3: "herd",
  4: "hvem",
  5: "tenable",
  6: "wordle"
};

const days = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
const todayIndex = new Date().getDay();
const todaysGame = games.find(g => g.id === weeklySchedule[todayIndex]) || games[0];

function cleanName(value) {
  return String(value || "").trim().toLowerCase();
}

function formatDate(value) {
  if (!value) return "";
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return "";
  return d.toLocaleDateString("no-NO", {
    day: "2-digit",
    month: "2-digit"
  });
}

function isTodayGame(gameId) {
  return todaysGame && todaysGame.id === gameId;
}

function challengeKey(row) {
  return `${cleanName(row.voter)}__${row.game || "unknown"}__${row.challenge_id || "daily"}`;
}

function buildTotalLeaderboard(rows) {
  const bestAttemptMap = {};

  rows.forEach(row => {
    if (["herd", "rebel"].includes(row.game)) return;

    const key = challengeKey(row);
    const score = Number(row.score || 0);

    if (!bestAttemptMap[key] || score > Number(bestAttemptMap[key].score || 0)) {
      bestAttemptMap[key] = row;
    }
  });

  const userMap = {};

  Object.values(bestAttemptMap).forEach(row => {
    const key = cleanName(row.voter);
    if (!key) return;

    if (!userMap[key]) {
      userMap[key] = {
        voter: row.voter,
        total: 0,
        gamesPlayed: new Set(),
        attempts: 0,
        latest: row.created_at
      };
    }

    userMap[key].total += Number(row.score || 0);
    userMap[key].gamesPlayed.add(row.game || "unknown");
    userMap[key].attempts += 1;

    if (new Date(row.created_at) > new Date(userMap[key].latest)) {
      userMap[key].latest = row.created_at;
    }
  });

  return Object.values(userMap)
    .map(user => ({
      ...user,
      gamesCount: user.gamesPlayed.size
    }))
    .sort((a, b) =>
      Number(b.total) - Number(a.total) ||
      Number(b.gamesCount) - Number(a.gamesCount) ||
      new Date(a.latest) - new Date(b.latest)
    );
}

function renderIdentity(user, allRows) {
  const box = document.getElementById("identityBox");

  if (!user) {
    box.innerHTML = `
      <div>
        <strong>Ingen bruker valgt</strong><br>
        <span style="color:var(--muted)">Sett forumnavn på Lynbørs-forsiden først.</span>
      </div>
      <a href="v2/index.html">Sett navn</a>
    `;
    return;
  }

  const leaderboard = buildTotalLeaderboard(allRows);
  const me = leaderboard.find(row => cleanName(row.voter) === cleanName(user));

  box.innerHTML = `
    <div>
      Spiller som <strong>${user}</strong><br>
      <span style="color:var(--muted)">
        ${me ? `Samlet Lyn Games-score: ${me.total} poeng` : "Ingen score lagret ennå"}
      </span>
    </div>
    <a href="${todaysGame.href}">Spill dagens game</a>
  `;
}

function renderTodayGame(rows, user) {
  const box = document.getElementById("todayGame");

  const relevantRows = rows.filter(row => row.game === todaysGame.id);
  const uniquePlayers = new Set(relevantRows.map(row => cleanName(row.voter)).filter(Boolean));

  const myBest = relevantRows
    .filter(row => cleanName(row.voter) === cleanName(user))
    .sort((a, b) => Number(b.score || 0) - Number(a.score || 0))[0];

  box.innerHTML = `
    <div class="game-title">${todaysGame.icon} ${todaysGame.title}</div>
    <div class="game-text">${todaysGame.text}</div>

    <div class="score-grid">
      <div class="score-box">
        <span>Din beste</span>
        <strong>${myBest ? myBest.score : "–"}</strong>
      </div>

      <div class="score-box">
        <span>Spillere</span>
        <strong>${uniquePlayers.size}</strong>
      </div>

      <div class="score-box">
        <span>Status</span>
        <strong>Åpen</strong>
      </div>
    </div>

    <div class="play-row">
      <a class="btn" href="${todaysGame.href}">Spill dagens game</a>
      <a class="btn secondary" href="#gamesGrid">Se ukens spill</a>
    </div>
  `;
}

function renderLeaderHero(leaderboard) {
  const box = document.getElementById("leaderHero");

  if (!leaderboard.length) {
    box.innerHTML = `<div class="empty">Ingen leder ennå. Perfekt tidspunkt å bli historisk.</div>`;
    return;
  }

  const leader = leaderboard[0];

  box.innerHTML = `
    <div class="leader-hero">
      <div class="label">Nåværende Games-sjef</div>
      <div class="name">👑 ${leader.voter}</div>
      <div class="score">${leader.total} poeng</div>
      <div class="leader-sub">
        ${leader.gamesCount} spill · ${leader.attempts} runder · sist ${formatDate(leader.latest)}
      </div>
    </div>
  `;
}

function renderLeaderboard(rows) {
  const box = document.getElementById("leaderboard");
  const leaderboard = buildTotalLeaderboard(rows);

  renderLeaderHero(leaderboard);

  if (!leaderboard.length) {
    box.innerHTML = `<div class="empty">Ingen score ennå. Bli første som setter standarden.</div>`;
    return;
  }

  box.innerHTML = leaderboard.slice(0, 10).map((row, index) => {
    const medal = index === 0 ? "gold" : "";

    return `
      <div class="leader-row">
        <div class="rank ${medal}">${index + 1}</div>

        <div>
          <div class="leader-name">${row.voter}</div>
          <div class="leader-sub">
            ${row.gamesCount} spill · ${row.attempts} runder · sist ${formatDate(row.latest)}
          </div>
        </div>

        <div class="leader-score">${row.total}</div>
      </div>
    `;
  }).join("");
}

function renderWeekStrip() {
  const box = document.getElementById("weekStrip");

  box.innerHTML = days.map((day, index) => {
    const game = games.find(g => g.id === weeklySchedule[index]);

    return `
      <div class="day ${index === todayIndex ? "active" : ""}">
        <strong>${game.icon}</strong>
        ${day}<br>
        ${game.title}
      </div>
    `;
  }).join("");
}

function renderGamesGrid() {
  const box = document.getElementById("gamesGrid");

  box.innerHTML = games.map(game => {
    const open = isTodayGame(game.id);

    return `
      <div class="mini-game ${open ? "today" : "locked"}">
        <div class="mini-icon">${game.icon}</div>
        <div class="mini-title">${game.title}</div>
        <div class="mini-text">${game.text}</div>

        <div class="mini-status">
          ${open ? "Dagens spill" : "Kommer senere i uka"}
        </div>

        <div style="margin-top:14px;">
          ${
            open
              ? `<a class="btn secondary" href="${game.href}">Spill nå</a>`
              : `<span class="btn secondary locked">Låst</span>`
          }
        </div>
      </div>
    `;
  }).join("");
}

async function loadRowsForGame(gameId) {
  try {
    const rows = await getGameLeaderboard(gameId);
    return rows.map(row => ({
      ...row,
      game: row.game || gameId
    }));
  } catch (error) {
    console.error(`Kunne ikke hente leaderboard for ${gameId}:`, error);
    return [];
  }
}

async function init() {
  const user = getGameUser();

  const allRows = (
    await Promise.all(games.map(game => loadRowsForGame(game.id)))
  ).flat();

  renderIdentity(user, allRows);
  renderTodayGame(allRows, user);
  renderLeaderboard(allRows);
  renderWeekStrip();
  renderGamesGrid();
}

init();
</script>
</body>
</html>
