const startDate = new Date("2026-01-01");
const today = new Date();
const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));

const player = players[diffDays % players.length];
const challengeId = `hvem-${diffDays}-${player.name}`;

let hintLevel = 0;
let finished = false;
let scoreSaved = false;

const userBox = document.getElementById("userBox");
const scoreBox = document.getElementById("scoreBox");
const image = document.getElementById("playerImage");
const input = document.getElementById("answerInput");
const answerBtn = document.getElementById("answerBtn");
const hintBtn = document.getElementById("hintBtn");
const giveUpBtn = document.getElementById("giveUpBtn");
const message = document.getElementById("message");
const hintBox = document.getElementById("hintBox");
const extraBox = document.getElementById("extraBox");

function currentScore() {
  const scores = {
    0: 100,
    1: 80,
    2: 60,
    3: 40
  };

  return scores[hintLevel] || 40;
}

function normalize(text) {
  return String(text || "")
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/æ/g, "ae")
    .replace(/ø/g, "o")
    .replace(/å/g, "a")
    .replace(/ð/g, "d")
    .replace(/[^a-z0-9 ]/g, "")
    .replace(/\s+/g, " ");
}

function isCorrect(value) {
  const guess = normalize(value);
  const accepted = player.aliases.map(normalize);

  return accepted.includes(guess);
}

function lockGame() {
  input.disabled = true;
  answerBtn.disabled = true;
  hintBtn.disabled = true;
  giveUpBtn.disabled = true;
}

function updateScoreBox() {
  scoreBox.innerHTML = `${currentScore()} poeng mulig`;
}

function showPlayerInfo() {
  hintBox.innerHTML = player.funHint;
  extraBox.innerHTML = `${player.position}. Spilte for Lyn i ${player.year}.`;
}

function saveScore(won, score) {
  if (scoreSaved) return;

  scoreSaved = true;

  saveGameScore({
    game: "hvem",
    challengeId,
    score,
    maxScore: 100,
    attempts: 1,
    details: {
      answer: player.name,
      hintsUsed: hintLevel,
      won,
      user: getGameUser()
    }
  }).then(result => {
    console.log("Hvem er dette score lagret:", result, score);
  });
}

function submitAnswer() {
  if (finished) return;

  const value = input.value.trim();

  if (!value) {
    message.innerHTML = "Skriv et navn først.";
    return;
  }

  if (isCorrect(value)) {
    finished = true;

    const score = currentScore();

    message.innerHTML = `🏆 Riktig! ${player.name} · ${score} poeng`;
    showPlayerInfo();
    lockGame();
    saveScore(true, score);
    return;
  }

  message.innerHTML = "❌ Feil. Prøv igjen eller bruk hint.";
  input.value = "";
  input.focus();
}

function showHint() {
  if (finished) return;

  if (hintLevel === 0) {
    hintBox.innerHTML = `Hint 1: ${player.position}`;
    hintLevel++;
  } else if (hintLevel === 1) {
    hintBox.innerHTML = `Hint 2: Spilte for Lyn i ${player.year}`;
    hintLevel++;
  } else if (hintLevel === 2) {
    hintBox.innerHTML = `Hint 3: ${player.funHint}`;
    hintLevel++;
  } else {
    hintBox.innerHTML = "Du har brukt alle hintene.";
  }

  updateScoreBox();
}

function giveUp() {
  if (finished) return;

  finished = true;

  message.innerHTML = `💀 Det var ${player.name}`;
  showPlayerInfo();
  lockGame();
  saveScore(false, 0);
}

async function initPlayedCheck() {
  const alreadyPlayed = await hasPlayedToday("hvem", challengeId);

  if (!alreadyPlayed) return;

  finished = true;
  lockGame();
  message.innerHTML = "🏆 Du har allerede spilt dagens Hvem er dette?";
  showPlayerInfo();
}

function init() {
  const user = getGameUser();

  userBox.innerHTML = user
    ? `Spiller som <strong>${user}</strong>`
    : `Sett forumnavn på forsiden først`;

  image.src = player.image;
  updateScoreBox();
  initPlayedCheck();
}

answerBtn.addEventListener("click", submitAnswer);
hintBtn.addEventListener("click", showHint);
giveUpBtn.addEventListener("click", giveUp);

input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    submitAnswer();
  }
});

init();
