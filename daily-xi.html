<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Lyn XI</title>

  <link rel="stylesheet" href="daily-xi.css">
</head>

<body>

  <div class="container">

    <h1>⚽ Daily Lyn XI</h1>
    <div class="profile-box" id="profileBox"></div>

    <div class="match-info">
      <div id="info"></div>
    </div>

    <div id="lives">❤️❤️❤️</div>

    <div class="guess-box">
      <input
        id="guessInput"
        type="text"
        placeholder="Skriv spiller..."
      >

      <button onclick="submitGuess()">
        Gjett
      </button>
    </div>

    <div id="message"></div>
    <div class="bonus-box" id="bonusBox"></div>

    <div id="pitch"></div>

  </div>

  <script src="daily-xi.js"></script>

</body>
</html>
